$schema: https://json-schema.org/draft/2020-12/schema
$id: https://github.com/robotsix/robotsix-auto-mail/blob/main/docs/modules.schema.yaml
title: Module taxonomy schema
description: Schema for docs/modules.yaml — the canonical module taxonomy.
type: object
additionalProperties: false
required:
  - modules
properties:
  modules:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - id
        - description
        - paths
      properties:
        id:
          type: string
        description:
          type: string
        paths:
          type: array
          minItems: 1
          items:
            type: string
        dependencies:
          type: array
          items:
            type: string
