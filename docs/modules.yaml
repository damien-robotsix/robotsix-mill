  # -------------------------------------------------------------------
  # Stages (ticket-lifecycle orchestrators)
  # -------------------------------------------------------------------

  - id: stages
    description: >-
      Stage definitions for every step in the ticket lifecycle.  Each stage
      is an orchestrator that loads the right agent(s), manages the workspace,
      handles pause/resume conversation state, and decides the next State
      transition.  The registry maps State values to their Stage.
    paths:
      - src/robotsix_mill/stages/__init__.py
      - src/robotsix_mill/stages/hooks.py
      - src/robotsix_mill/stages/base.py
      - src/robotsix_mill/stages/registry.py
