# Canonical Module Taxonomy for robotsix-mill
#
# This file is the single source of truth for "what modules exist and
# where their files live."
#
# Schema: bundled with the robotsix-modules package (see
# https://github.com/damien-robotsix/robotsix-modules).
# Validation: pre-commit hook `validate-module-taxonomy` + CI step

modules:
  # -------------------------------------------------------------------
  # Foundations
  # -------------------------------------------------------------------

  - id: config
    description: >-
      Application configuration layer.  Provides Settings (pydantic-settings),
      RepoConfig/ReposRegistry, YAML config loading, and secrets management.
      Every other module depends on this.
    paths:
      - src/robotsix_mill/config/*.py
      - src/robotsix_mill/__init__.py
      - src/robotsix_mill/py.typed
      - config/config.schema.json
      - config/config.example.json
      - config/repos.example.yaml
      - .robotsix-mill/config.yaml
      - .robotsix-mill/periodic/*.yaml
      - docs/config/**/*
      - tests/config/test_config.py
      - tests/config/test_repo_settings.py
      - tests/config/test_workspace_members.py
      - tests/config/test_member_sync_config.py
      - tests/config/test_cross_repo_target.py
      - tests/config/test_global_langfuse.py
      - tests/config/test_target_branch_for.py
      - tests/config/test_repos_source.py
      - tests/config/test_repos_registry_shape.py
      - tests/config/test_secrets.py
    dependencies: []

  - id: core
    description: >-
      Core domain model: Ticket, Comment, State, SQLModel-backed persistence,
      TicketService business logic, datetime/text utilities, and the Workspace
      abstraction for file-based ticket workspaces.
    paths:
      - src/robotsix_mill/core/__init__.py
      - src/robotsix_mill/core/models.py
      - src/robotsix_mill/core/states.py
      - src/robotsix_mill/core/db.py
      - src/robotsix_mill/core/service/*.py
      - src/robotsix_mill/core/workspace.py
      - src/robotsix_mill/core/datetime_utils.py
      - src/robotsix_mill/core/text_utils.py
      - src/robotsix_mill/core/sqlite_utils.py
      - src/robotsix_mill/core/delta_context.py
      - src/robotsix_mill/core/constants.py
      - src/robotsix_mill/core/text_noop.py
      - src/robotsix_mill/core/duration.py
      - src/robotsix_mill/core/dedup.py
      - src/robotsix_mill/core/repo_layout.py
      - src/robotsix_mill/core/tool_wrappers.py
      - docs/core/**/*
      - tests/core/test_core_dedup.py
      - tests/core/test_db.py
      - tests/core/test_models.py
      - tests/core/test_states.py
      - tests/core/test_service.py
      - tests/core/test_sqlite_utils.py
      - tests/core/test_datetime_utils.py
      - tests/core/test_text_noop.py
      - tests/core/test_text_utils.py
      - tests/core/test_duration.py
      - tests/core/test_memory_db.py
      - tests/core/test_prune_clone.py
      - tests/core/test_workspace.py
      - tests/core/test_workspace_screenshots.py
      - tests/core/test_repo_layout.py
      - tests/core/test_tool_wrappers.py
      - tests/core/test_delta_context.py
    dependencies: [config]

  - id: deps
    description: >-
      Read-only internal dependency graph model.  Parses
      ``[tool.uv.sources]`` git ``rev`` pins from ``pyproject.toml``
      files and builds a directed, topologically sorted dependency graph
      of robotsix repos.
    paths:
      - src/robotsix_mill/deps/*.py
      - tests/deps/*.py
      - docs/deps/**/*
    dependencies: [config]

  - id: deploy
    description: >-
      Deploy-server integration: worker-image freshness checks.
      Queries the deploy server's ``GET /services/mill`` endpoint to
      compare running vs latest image digests, so the implement
      preflight and resume-blocked paths can gate on stale images
      before burning an attempt.
    paths:
      - src/robotsix_mill/deploy/__init__.py
      - tests/deploy/__init__.py
      - tests/deploy/test_deploy.py
    dependencies: [config]

  # -------------------------------------------------------------------
  # Forge & VCS
  # -------------------------------------------------------------------

  - id: vcs
    description: >-
      Low-level version-control operations: clone, branch, commit, push.
      Thin wrapper around the git CLI via subprocess.  No dependencies on
      any other robotsix-mill module.
    paths:
      - src/robotsix_mill/vcs/git_ops.py
      - src/robotsix_mill/vcs/__init__.py
      - tests/vcs/__init__.py
      - tests/vcs/test_clone_all_repos.py
      - tests/vcs/test_git_ops.py
      - docs/vcs/**/*
    dependencies: []

  - id: forge
    description: >-
      Forge abstraction layer.  Defines a Forge base class and implements
      GitHub and GitLab backends for issue/PR creation, commenting, and
      repository metadata.  Also handles forge authentication (PAT, GitHub
      App installation tokens).
    paths:
      - src/robotsix_mill/forge/__init__.py
      - src/robotsix_mill/forge/base.py
      - src/robotsix_mill/forge/auth.py
      - src/robotsix_mill/forge/github.py
      - src/robotsix_mill/forge/github_pr.py
      - src/robotsix_mill/forge/github_ci.py
