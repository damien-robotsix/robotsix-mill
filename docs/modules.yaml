  # -------------------------------------------------------------------
  # Agents
  # -------------------------------------------------------------------

  - id: agents
    description: >-
      Agent infrastructure, tool factories, and domain agent modules that
      implement specific ticket-processing roles.  Provides agent-builder
      (build_agent_from_definition), YAML/expert definition loading,
      tool registry, prompt-block helpers, retry logic, cost-tracked
      OpenRouter model wrapper, filesystem/web tools, explore sub-agent,
      web research, report_issue, jscpd copy-paste detection, CI-pattern
      memory, library/expert consultation entry points, and all domain
      agents: orchestrator (coordinating), coding, testing, reviewing,
      auditing, refining, documenting, answering, dedup, CI-fixing,
      rebasing, review-revision checking, surveying, health checking,
      agent-check, backwards-compatibility check, completeness check,
      scope triage, epic breakdown/status, environment sync, and
      retrospect.
    paths:
      - src/robotsix_mill/agents/*.py
      - src/robotsix_mill/_resources.py
      - tests/agents/*.py
      - docs/agents/**/*
    dependencies: [config, core, sandbox, langfuse, forge, vcs, runners]

  # -------------------------------------------------------------------
  # Meta-pass (cross-repo analysis)
  # -------------------------------------------------------------------

  - id: meta
    description: >-
      Meta-pass cross-repo analysis infrastructure.  Hosts the meta-agent
      reasoning core (surveys every registered repo and emits extraction
      and alignment proposals), the meta repo-triage agent (decides which
      repos a meta-board ticket touches), the multi-repo workspace builder
      used by refine/implement on meta tickets, and the meta-pass
      integration runner that wires everything together (clone-all,
      meta-agent, board routing, cross-repo memory ledger, mill-pinned
      tracing).
    paths:
      - src/robotsix_mill/meta/__init__.py
      - src/robotsix_mill/meta/agent.py
      - src/robotsix_mill/meta/todo_scan.py
      - src/robotsix_mill/meta/triage.py
      - src/robotsix_mill/meta/runner.py
      - src/robotsix_mill/meta/workspace.py
      - tests/meta/test_agent_build.py
      - tests/meta/test_agent_helpers.py
      - tests/meta/test_todo_scan.py
      - tests/meta/test_triage.py
      - tests/meta/test_runner.py
      - tests/meta/test_meta_workspace.py
      - docs/meta/**/*
    dependencies: [config, core, agents, forge, vcs, runners, runtime]

  # -------------------------------------------------------------------
  # Support services
  # -------------------------------------------------------------------

  - id: repo-scaffold
    description: >-
      Repo-scaffold workflow.  When a meta-board ticket carries a
      ``new-repo`` extraction marker, this module calls
      ``Forge.create_repo()``, scaffolds an initial commit (README,
      LICENSE, Python skeleton), and registers the new repo in
      ``config/repos.yaml``.
    paths:
      - src/robotsix_mill/repo_scaffold/**/*.py
      - tests/repo_scaffold/test_repo_scaffold.py
      - tests/repo_scaffold/test_workspace_member_sync.py
      - docs/repo-scaffold/**/*
    dependencies: [config, forge, vcs]

  - id: sandbox
    description: >-
      Isolated subprocess execution environment.  Provides a safe sandbox
      for running agent tools (explore, tests, web requests) with resource
      limits.  Consumed by agents.
    paths:
      - src/robotsix_mill/sandbox/**/*.py
      - tests/sandbox/test_sandbox.py
      - tests/sandbox/test_sandbox_integration.py
      - sandbox/**/*
      - docs/sandbox/**/*
    dependencies: [config]

  - id: cli
    description: >-
      Command-line entry point (robotsix-mill).  Serves as the
      management-plane CLI for manual operations and is the registered
      console-script target.
    paths:
      - src/robotsix_mill/cli/**/*.py
      - contrib/completions/*
      - docs/cli/**/*
      - tests/cli/test_cli.py
      - tests/cli/test_repos_list.py
      - tests/cli/test_screenshot_cli.py
    dependencies: [config, core]

  - id: langfuse
    description: >-
      Langfuse observability client.  Provides session-level cost tracking
      and trace-fetch helpers consumed by the runtime tracing layer, the
      retrospect stage, and several agents.
    paths:
      - src/robotsix_mill/langfuse/__init__.py
      - src/robotsix_mill/langfuse/client.py
      - tests/langfuse/test_langfuse_client.py
      - tests/langfuse/test_trace_health.py
      - docs/langfuse/**/*
    dependencies: [config]

  - id: notify
    description: >-
      Outbound notification sender.  Posts ticket-state-change
      notifications to configured webhook URLs.
    paths:
      - src/robotsix_mill/notify/__init__.py
      - tests/notify/test_notify.py
      - docs/notify/**/*
    dependencies: [config, core]

  # -------------------------------------------------------------------
  # Agent definitions, skills, experts, docs
  # -------------------------------------------------------------------

  - id: agent-definitions
    description: >-
      YAML agent and expert definition files.  These are the declarative
      system prompts, tool lists, and model configurations that control
      every agent and domain expert.
    paths:
      - agent_definitions/*.yaml
      - agent_definitions/periodic/*.yaml
      - agent_definitions/pipeline/*.yaml
      - agent_definitions/_shared/*.yaml
      - expert_definitions/*.yaml
      - agent_definitions/language_instructions/*.md
      - docs/agent-definitions/**/*
    dependencies: []

  - id: skills
    description: >-
      Agent skill files: Markdown documents injected into agent contexts
      to teach specific workflows (board interaction, ask-user guardrails).
    paths:
      - skills/**/*
    dependencies: []

  - id: docs
    description: >-
      Project documentation site (MkDocs / Markdown).  Covers agent
      catalog, configuration, deployment, security, and design docs.
      Includes the module taxonomy and its schema.
    paths:
      - docs/*.md
      - docs/*.yaml
      - docs/design/**/*
      - docs/guides/**/*
      - docs/reference/**/*
      - mkdocs.yml
      - agent_references/**/*
    dependencies: []

  - id: dev-tooling
    description: >-
      Developer tooling: dev scripts, Docker image definition, repo
      configuration (Makefile, pyproject.toml, pre-commit hooks, CI
      workflows), and static-analysis config.  Not part of the
      production runtime.
    paths:
      - docs/dev-tooling/**/*
      - src/robotsix_mill/dev_tooling/**/*.py
      - Makefile
      - Dockerfile
      - entrypoint.sh
      - docker-compose.yml
      - docker-compose.override.example.yml
      - deploy/docker-compose.yml
      - .dockerignore
      - .shellcheckrc
      - .hadolint.yaml
      - pyproject.toml
      - uv.lock
      - .pre-commit-config.yaml
      - renovate.json
      - .github/**/*
      - .jscpd.json
      - lychee.toml
      - .python-version
      - .trivyignore
      - .secrets.baseline
      - mypy-baseline.txt
      - mypy-baseline-test.txt
      - vulture_whitelist.py
      - scripts/**/*
