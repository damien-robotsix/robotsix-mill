      - src/robotsix_mill/forge/github_dependabot.py
      - src/robotsix_mill/forge/github_security.py
      - src/robotsix_mill/forge/gitlab/__init__.py
      - src/robotsix_mill/forge/gitlab/core.py
      - src/robotsix_mill/forge/gitlab/ci.py
      - src/robotsix_mill/forge/gitlab/code_scanning.py
      - src/robotsix_mill/forge/gitlab/dependabot.py
      - src/robotsix_mill/forge/_github_pagination.py
      - src/robotsix_mill/forge/gitlab/_pagination.py
      - src/robotsix_mill/forge/_http.py
      - src/robotsix_mill/forge/_log_utils.py
      - tests/forge/test_forge_auth.py
      - tests/forge/test_forge_base.py
      - tests/forge/test_github.py
      - tests/forge/test_github_dependabot.py
      - tests/forge/test_github_security.py
      - tests/forge/test_gitlab.py
      - tests/forge/test_http.py
      - docs/forge/**/*
    dependencies: [config, vcs]

  # -------------------------------------------------------------------
  # Runtime (HTTP API + async worker loop)
  # -------------------------------------------------------------------

  - id: runtime
    description: >-
      The FastAPI HTTP API server and its async worker loop.  Routes
      webhook and management-plane requests, enqueues stage runs, and
      orchestrates the event-driven lifecycle.  Includes tracing
      instrumentation (OpenTelemetry/Langfuse), the run registry,
      deep-review storage, CI-monitor endpoint, and the board HTML page.
    paths:
      - src/robotsix_mill/runtime/__init__.py
      - src/robotsix_mill/runtime/api.py
      - src/robotsix_mill/runtime/errors.py
      - src/robotsix_mill/runtime/exception_handlers.py
      - src/robotsix_mill/runtime/routes/**/*.py
      - src/robotsix_mill/runtime/worker/*.py
      - src/robotsix_mill/runtime/deps.py
      - src/robotsix_mill/runtime/lifespan.py
      - src/robotsix_mill/runtime/middleware.py
      - src/robotsix_mill/runtime/tracing.py
