      - tests/runtime/test_recent_traces.py
      - tests/runtime/test_run_registry.py
      - tests/runtime/test_stage_retry.py
      - tests/runtime/test_tickets_ingest.py
      - tests/runtime/test_tracing.py
      - tests/runtime/test_transient_errors.py
      - tests/runtime/test_repos_endpoint.py
      - tests/runtime/routes/**/*.py
      - tests/runtime/routes/**/*.mjs
      - tests/runtime/worker/**/*.py
    dependencies: [config, core, forge, stages]

  # -------------------------------------------------------------------
  # Runners (glue between runtime workers and agents)
  # -------------------------------------------------------------------

  - id: runners
    description: >-
      The glue layer that wires up services (TicketService, forges) and
      calls agents.  Each runner is a self-contained script that the worker
      invokes for periodic maintenance or stage execution.  Includes the
      shared pass_runner subroutine used by several agent-family runners.
      Runners deliberately live at ``src/robotsix_mill/`` root (not under
      ``agents/``): they are the orchestration layer above agents, share
      infrastructure (``pass_runner``, ``periodic_runner``) that is not
      per-agent, and are registered by string path from
      ``runtime/worker.py`` and monkeypatched by string path from tests,
      so co-locating them with agents would fragment the orchestration
      layer without simplifying any caller.  The tight ``meta`` family
      is the documented exception where a runner is grouped with its
      agents: they are consolidated into the ``src/robotsix_mill/meta/``
      subpackage (``agent.py`` + ``triage.py`` + ``runner.py`` +
      ``workspace.py``) under the ``meta`` module.
    paths:
      - src/robotsix_mill/runners/__init__.py
      - src/robotsix_mill/runners/pass_runner.py
      - src/robotsix_mill/runners/run_health_runner.py
      - src/robotsix_mill/runners/diagnostic_runner.py
      - src/robotsix_mill/runners/diagnostic_checks.py
