# Canonical module taxonomy for robotsix-auto-mail.
#
# Each module declares an id, a human-readable description, and the
# set of repo-relative file paths it owns.  Every file in the repo
# must belong to exactly one module.  Paths use forward slashes.
#
# This file is the source of truth for drift detection: any file not
# listed here is "unclassified"; any listed path that no longer exists
# is "stale"; any new module proposal must start by adding an entry here.

modules:
  - id: core
    description: >-
      Project root, package identity, build configuration, and roadmap.
    paths:
      - .mail_data/.gitkeep
      - src/robotsix_auto_mail/__init__.py
      - src/robotsix_auto_mail/format.py
      - pyproject.toml
      - uv.lock
      - .gitignore
      - .python-version
      - LICENSE
      - README.md
      - ROADMAP.md
      - tests/test_stub.py

  - id: docker
    description: >-
      Docker image definition, Compose orchestration, and
      container entrypoint.
    paths:
      - .dockerignore
      - Dockerfile
      - docker-compose.yml
      - entrypoint.sh

  - id: cli
    description: >-
      CLI entry point exposing probe and ingest subcommands.
    paths:
      - src/robotsix_auto_mail/cli.py
      - tests/test_cli.py

  - id: config
    description: >-
      Configuration loading (YAML file + env), config template.
    paths:
      - src/robotsix_auto_mail/config.py
      - tests/test_config.py
      - .env.example
      - config/.gitkeep
      - config/mail.local.example.yaml

  - id: db
    description: >-
      SQLite datastore: schema, MailRecord, insert, watermark.
    paths:
      - src/robotsix_auto_mail/db.py
      - tests/test_db.py

  - id: status
    description: >-
      Mail-processing status read/write layer for the kanban board.
    paths:
      - src/robotsix_auto_mail/status.py
      - tests/test_status.py

  - id: detect
    description: >-
      MX-record provider detection and auto-configuration lookup
      (Mozilla ISPDB, autoconfig XML, LLM fallback).
    paths:
      - src/robotsix_auto_mail/detect.py
      - tests/test_detect.py

  - id: fetch
    description: >-
      Watermark-aware IMAP fetch logic.
    paths:
      - src/robotsix_auto_mail/fetch.py
      - tests/test_fetch.py

  - id: imap
    description: >-
      Low-level IMAP client (stdlib imaplib wrapper).
    paths:
      - src/robotsix_auto_mail/imap.py
      - tests/test_imap.py

  - id: parser
    description: >-
      MIME to MailRecord parsing.
    paths:
      - src/robotsix_auto_mail/parser.py
      - tests/test_parser.py

  - id: pipeline
    description: >-
      Ingestion orchestration: fetch, parse, store, watermark.
    paths:
      - src/robotsix_auto_mail/pipeline.py
      - tests/test_pipeline.py

  - id: smtp
    description: >-
      SMTP sending client.
    paths:
      - src/robotsix_auto_mail/smtp_client.py
      - tests/test_smtp_client.py

  - id: server
    description: >-
      HTTP kanban board server exposing the mail database as
      a read/write web UI.
    paths:
      - src/robotsix_auto_mail/server.py
      - tests/test_server.py

  - id: docs
    description: >-
      User-facing documentation and architecture decisions.
    paths:
      - docs/connecting.md
      - docs/deployment.md
      - docs/ingestion.md
      - docs/modules.yaml
      - docs/modules.schema.yaml
      - docs/decisions/0001-programming-language.md

  - id: ci
    description: >-
      CI and developer-side quality-gate tooling: GitHub Actions
      pipeline, dependency updates, and local pre-commit hooks
      (including the detect-secrets baseline).
    paths:
      - .github/dependabot.yml
      - .github/workflows/ci.yml
      - .pre-commit-config.yaml
      - .secrets.baseline
