modules:
  - id: robotsix_llmio-core
    paths:
      - src/robotsix_llmio/__init__.py
      - src/robotsix_llmio/core/**
      - src/robotsix_llmio/py.typed
      - tests/core/test_core_retry.py
      - tests/core/test_core_provider.py
      - docs/core/
  - id: robotsix_llmio-openrouter
    description: >
      OpenRouter transport layer — base model-family-agnostic provider.
    paths:
      - src/robotsix_llmio/openrouter/**
      - tests/openrouter/test_openrouter.py
  - id: robotsix_llmio-openrouter-deepseek
    description: >
      Derived DeepSeek layer that pins the generic OpenRouter transport
      to DeepSeek models and configures per-tier reasoning policy.
    paths:
      - src/robotsix_llmio/openrouter_deepseek/**
      - tests/openrouter_deepseek/test_openrouter_deepseek.py
      - tests/openrouter_deepseek/test_openrouter_deepseek_live.py
      - docs/openrouter_deepseek/
  - id: robotsix_llmio-claude-sdk
    paths:
      - src/robotsix_llmio/claude_sdk/**
      - tests/claude_sdk/test_claude_sdk.py
      - tests/claude_sdk/test_confine_hook.py
      - docs/claude_sdk/
