name: Docker Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      sandbox: ${{ steps.detect.outputs.sandbox }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          # Need the parent commit available so ``git diff`` against
          # ``github.event.before`` works; this job never writes to the repo.
          fetch-depth: 0
          persist-credentials: false

      - name: Detect sandbox/Dockerfile changes
        id: detect
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          # Fail safe toward rebuilding: a branch-creation / first push
          # (zero-SHA ``before``) or an unavailable diff base resolves to
          # sandbox=true. A change to sandbox/Dockerfile OR to this workflow
          # file (so edits to the publish-sandbox job logic still rebuild)
          # also resolves to sandbox=true.
          zero="0000000000000000000000000000000000000000"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "$zero" ] || ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            echo "Diff base unavailable; defaulting to rebuild."
            echo "sandbox=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BEFORE" "$AFTER" \
              | grep -qE '^(sandbox/Dockerfile|\.github/workflows/docker-publish\.yml)$'; then
            echo "sandbox=true" >> "$GITHUB_OUTPUT"
          else
            echo "sandbox=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      attestations: write
      contents: read
      security-events: write  # required to upload the Trivy SARIF
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          # Image build needs the source tree, not git write access;
          # the push targets Docker Hub, not the repo.
          persist-credentials: false

      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

      # Shell-based retry loop instead of a bare docker/login-action: a single
      # transient timeout against registry-1.docker.io must not fail the whole
      # publish job. Credential stays off the command line via --password-stdin.
      - name: Log in to Docker Hub (with retry)
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          for attempt in 1 2 3 4 5; do
            echo "Docker Hub login attempt $attempt..."
            if echo "$DOCKERHUB_TOKEN" | docker login docker.io -u "$DOCKERHUB_USERNAME" --password-stdin; then
              echo "Docker Hub login succeeded."
              exit 0
            fi
            echo "Login attempt $attempt failed; retrying in $((attempt * 10))s..."
            sleep $((attempt * 10))
          done
          echo "::error::Docker Hub login failed after 5 attempts."
          exit 1

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6
        with:
          images: docker.io/robotsix/mill
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Resolve scan image tag
        id: scan-ref
        # Pass the metadata-action output via env, not inline ``${{ }}``
        # interpolation into the run block, to avoid template injection.
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: echo "image=$(echo "$TAGS" | head -1)" >> "$GITHUB_OUTPUT"

      # Functional smoke guard: assert the sandbox-contract tool `gh` is on
      # PATH in the locally-loaded image. production extends base, so this
      # validates the new `gh` apt layer transitively. Fails the job if `gh`
      # is missing — prevents the provisioning drift this PR fixes from
      # silently recurring.
      - name: Assert sandbox-contract tools present (gh)
        env:
          IMAGE: ${{ steps.scan-ref.outputs.image }}
        run: docker run --rm --entrypoint gh "$IMAGE" --version

      # Gate: only CRITICAL, fixable CVEs block the pipeline. Runs in
      # table format so the failing CVE row is visible in the CI log
      # (SARIF mode would silently swallow it — see below).
      - name: Trivy vulnerability scan (gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ steps.scan-ref.outputs.image }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

      # Code-scanning surface: separate Trivy run that emits SARIF for
      # all severities (no exit-code). The two steps MUST stay separate:
      # the trivy-action's entrypoint unsets TRIVY_SEVERITY when
      # format=sarif (unless limit-severities-for-sarif=true), so
      # combining gate + SARIF into one step would silently scan for
      # ALL severities and fail on HIGH/MEDIUM findings the gate is
      # supposed to ignore. `if: always()` so we still surface findings
      # in the Security tab even when the gate above trips.
      - name: Trivy vulnerability scan (SARIF for code-scanning)
        # Only scan when an image was actually built. Without this guard, a
        # failed build leaves scan-ref empty and trivy defaults to `.`, then
        # fails with a misleading "could not parse reference: ." that masks
        # the real build error.
        if: ${{ always() && steps.scan-ref.outputs.image != '' }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ steps.scan-ref.outputs.image }}
          format: sarif
          output: trivy-results.sarif
          # No exit-code: this step is observability-only.
          ignore-unfixed: true

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463  # v4.36.1
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        # Code-scanning upload is observability-only; a SARIF-upload auth
        # failure (e.g. 401) must not gate the image publish.
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

      - name: Push Docker image
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: docker.io/robotsix/mill@${{ steps.push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom.cdx.json

      # GitHub attestation persistence is best-effort: the signed attestation
      # is already pushed to the registry (push-to-registry: true) and the SBOM
      # is preserved as a workflow artifact, so a transient 401 from the
      # create-an-attestation API must not gate the publish.
      - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26  # v4.1.0
        continue-on-error: true
        with:
          subject-name: docker.io/robotsix/mill
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: sbom.cdx.json
          push-to-registry: true

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sbom.cdx.json
          path: sbom.cdx.json

  publish-sandbox:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.sandbox == 'true' }}
    permissions:
      id-token: write
      packages: write
      attestations: write
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          # Image build needs the source tree, not git write access;
          # the push targets Docker Hub, not the repo.
          persist-credentials: false

      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: sandbox/Dockerfile
          failure-threshold: warning

      # Shell-based retry loop instead of a bare docker/login-action: a single
      # transient timeout against registry-1.docker.io must not fail the whole
      # publish job. Credential stays off the command line via --password-stdin.
      - name: Log in to Docker Hub (with retry)
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          for attempt in 1 2 3 4 5; do
            echo "Docker Hub login attempt $attempt..."
            if echo "$DOCKERHUB_TOKEN" | docker login docker.io -u "$DOCKERHUB_USERNAME" --password-stdin; then
              echo "Docker Hub login succeeded."
              exit 0
            fi
            echo "Login attempt $attempt failed; retrying in $((attempt * 10))s..."
            sleep $((attempt * 10))
          done
          echo "::error::Docker Hub login failed after 5 attempts."
          exit 1

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6
        with:
          images: docker.io/robotsix/mill-sandbox
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: sandbox/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Resolve scan image tag
        id: scan-ref
        # Pass the metadata-action output via env, not inline ``${{ }}``
        # interpolation into the run block, to avoid template injection.
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: echo "image=$(echo "$TAGS" | head -1)" >> "$GITHUB_OUTPUT"

      # Functional smoke guard: assert the sandbox-contract tool `gh` is on
      # PATH in the locally-loaded sandbox image. Fails the job if `gh` is
      # missing.
      - name: Assert sandbox-contract tools present (gh)
        env:
          IMAGE: ${{ steps.scan-ref.outputs.image }}
        run: docker run --rm --entrypoint gh "$IMAGE" --version

      # `uv` MUST be reachable by the NON-root runtime user — sandbox.py
      # launches containers with `--user $UID:$GID` + HOME=/tmp. The
      # installer's default target (/root/.local/bin) is off-PATH and
      # unreadable under that user, which silently breaks `uv lock` /
      # `uv sync`. Run the check AS a non-root uid to catch that drift.
      - name: Assert uv reachable as the non-root runtime user
        env:
          IMAGE: ${{ steps.scan-ref.outputs.image }}
        run: docker run --rm --user 1000:1000 -e HOME=/tmp --entrypoint uv "$IMAGE" --version

      - name: Trivy vulnerability scan (gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ steps.scan-ref.outputs.image }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

      - name: Trivy vulnerability scan (SARIF for code-scanning)
        # Only scan when an image was actually built. Without this guard, a
        # failed build leaves scan-ref empty and trivy defaults to `.`, then
        # fails with a misleading "could not parse reference: ." that masks
        # the real build error.
        if: ${{ always() && steps.scan-ref.outputs.image != '' }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ steps.scan-ref.outputs.image }}
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463  # v4.36.1
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        # Code-scanning upload is observability-only; a SARIF-upload auth
        # failure (e.g. 401) must not gate the image publish.
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

      - name: Push Docker image
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: sandbox/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: docker.io/robotsix/mill-sandbox@${{ steps.push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-sandbox.cdx.json

      # GitHub attestation persistence is best-effort: the signed attestation
      # is already pushed to the registry (push-to-registry: true) and the SBOM
      # is preserved as a workflow artifact, so a transient 401 from the
      # create-an-attestation API must not gate the publish.
      - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26  # v4.1.0
        continue-on-error: true
        with:
          subject-name: docker.io/robotsix/mill-sandbox
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: sbom-sandbox.cdx.json
          push-to-registry: true

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sbom-sandbox.cdx.json
          path: sbom-sandbox.cdx.json

  publish-proxy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      attestations: write
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          # Image build needs the source tree, not git write access;
          # the push targets Docker Hub, not the repo.
          persist-credentials: false

      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: sandbox/proxy/Dockerfile
          failure-threshold: warning

      # Shell-based retry loop instead of a bare docker/login-action: a single
      # transient timeout against registry-1.docker.io must not fail the whole
      # publish job. Credential stays off the command line via --password-stdin.
      - name: Log in to Docker Hub (with retry)
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          for attempt in 1 2 3 4 5; do
            echo "Docker Hub login attempt $attempt..."
            if echo "$DOCKERHUB_TOKEN" | docker login docker.io -u "$DOCKERHUB_USERNAME" --password-stdin; then
              echo "Docker Hub login succeeded."
              exit 0
            fi
            echo "Login attempt $attempt failed; retrying in $((attempt * 10))s..."
            sleep $((attempt * 10))
          done
          echo "::error::Docker Hub login failed after 5 attempts."
          exit 1

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6
        with:
          images: docker.io/robotsix/mill-sandbox-proxy
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          # context = sandbox/proxy so the Dockerfile's COPY tinyproxy.conf /
          # COPY filter resolve; `file` is relative to the workspace root
          # (like publish-sandbox's `file: sandbox/Dockerfile`), so it must be
          # the full path — a bare `Dockerfile` resolved to the repo-root mill
          # Dockerfile and failed the build.
          context: sandbox/proxy
          file: sandbox/proxy/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Resolve scan image tag
        id: scan-ref
        # Pass the metadata-action output via env, not inline ``${{ }}``
        # interpolation into the run block, to avoid template injection.
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: echo "image=$(echo "$TAGS" | head -1)" >> "$GITHUB_OUTPUT"

      - name: Trivy vulnerability scan (gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ steps.scan-ref.outputs.image }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

      - name: Trivy vulnerability scan (SARIF for code-scanning)
        # Only scan when an image was actually built. Without this guard, a
        # failed build leaves scan-ref empty and trivy defaults to `.`, then
        # fails with a misleading "could not parse reference: ." that masks
        # the real build error.
        if: ${{ always() && steps.scan-ref.outputs.image != '' }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ steps.scan-ref.outputs.image }}
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463  # v4.36.1
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        # Code-scanning upload is observability-only; a SARIF-upload auth
        # failure (e.g. 401) must not gate the image publish.
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

      - name: Push Docker image
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          # context = sandbox/proxy so the Dockerfile's COPY tinyproxy.conf /
          # COPY filter resolve; `file` is relative to the workspace root
          # (like publish-sandbox's `file: sandbox/Dockerfile`), so it must be
          # the full path — a bare `Dockerfile` resolved to the repo-root mill
          # Dockerfile and failed the build.
          context: sandbox/proxy
          file: sandbox/proxy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: docker.io/robotsix/mill-sandbox-proxy@${{ steps.push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-proxy.cdx.json

      # GitHub attestation persistence is best-effort: the signed attestation
      # is already pushed to the registry (push-to-registry: true) and the SBOM
      # is preserved as a workflow artifact, so a transient 401 from the
      # create-an-attestation API must not gate the publish.
      - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26  # v4.1.0
        continue-on-error: true
        with:
          subject-name: docker.io/robotsix/mill-sandbox-proxy
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: sbom-proxy.cdx.json
          push-to-registry: true

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sbom-proxy.cdx.json
          path: sbom-proxy.cdx.json
