name: Docker Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      attestations: write
      contents: read
      security-events: write  # required to upload the Trivy SARIF
    steps:
      - uses: actions/checkout@v4

      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: docker.io/robotsix/mill
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resolve scan image tag
        id: scan-ref
        run: echo "image=$(echo "${{ steps.meta.outputs.tags }}" | head -1)" >> $GITHUB_OUTPUT

      # Gate: only CRITICAL, fixable CVEs block the pipeline. Runs in
      # table format so the failing CVE row is visible in the CI log
      # (SARIF mode would silently swallow it — see below).
      - name: Trivy vulnerability scan (gate)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.scan-ref.outputs.image }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

      # Code-scanning surface: separate Trivy run that emits SARIF for
      # all severities (no exit-code). The two steps MUST stay separate:
      # the trivy-action's entrypoint unsets TRIVY_SEVERITY when
      # format=sarif (unless limit-severities-for-sarif=true), so
      # combining gate + SARIF into one step would silently scan for
      # ALL severities and fail on HIGH/MEDIUM findings the gate is
      # supposed to ignore. `if: always()` so we still surface findings
      # in the Security tab even when the gate above trips.
      - name: Trivy vulnerability scan (SARIF for code-scanning)
        # Only scan when an image was actually built. Without this guard, a
        # failed build leaves scan-ref empty and trivy defaults to `.`, then
        # fails with a misleading "could not parse reference: ." that masks
        # the real build error.
        if: ${{ always() && steps.scan-ref.outputs.image != '' }}
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.scan-ref.outputs.image }}
          format: sarif
          output: trivy-results.sarif
          # No exit-code: this step is observability-only.
          ignore-unfixed: true

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        with:
          sarif_file: trivy-results.sarif

      - name: Push Docker image
        id: push
        run: |
          for tag in $(echo "${{ steps.meta.outputs.tags }}"); do
            docker push "$tag"
          done
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${{ steps.scan-ref.outputs.image }}" | cut -d'@' -f2)
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

      - uses: anchore/sbom-action@v0.21.0
        with:
          image: docker.io/robotsix/mill@${{ steps.push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - uses: actions/attest@v4
        with:
          subject-name: docker.io/robotsix/mill
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: sbom.cdx.json
          push-to-registry: true

      - uses: actions/upload-artifact@v4
        with:
          name: sbom.cdx.json
          path: sbom.cdx.json

  publish-sandbox:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      attestations: write
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: sandbox/Dockerfile
          failure-threshold: warning

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: docker.io/robotsix/mill-sandbox
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: sandbox/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resolve scan image tag
        id: scan-ref
        run: echo "image=$(echo "${{ steps.meta.outputs.tags }}" | head -1)" >> $GITHUB_OUTPUT

      - name: Trivy vulnerability scan (gate)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.scan-ref.outputs.image }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

      - name: Trivy vulnerability scan (SARIF for code-scanning)
        # Only scan when an image was actually built. Without this guard, a
        # failed build leaves scan-ref empty and trivy defaults to `.`, then
        # fails with a misleading "could not parse reference: ." that masks
        # the real build error.
        if: ${{ always() && steps.scan-ref.outputs.image != '' }}
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.scan-ref.outputs.image }}
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        with:
          sarif_file: trivy-results.sarif

      - name: Push Docker image
        id: push
        run: |
          for tag in $(echo "${{ steps.meta.outputs.tags }}"); do
            docker push "$tag"
          done
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${{ steps.scan-ref.outputs.image }}" | cut -d'@' -f2)
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

      - uses: anchore/sbom-action@v0.21.0
        with:
          image: docker.io/robotsix/mill-sandbox@${{ steps.push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-sandbox.cdx.json

      - uses: actions/attest@v4
        with:
          subject-name: docker.io/robotsix/mill-sandbox
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: sbom-sandbox.cdx.json
          push-to-registry: true

      - uses: actions/upload-artifact@v4
        with:
          name: sbom-sandbox.cdx.json
          path: sbom-sandbox.cdx.json

  publish-proxy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      attestations: write
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: sandbox/proxy/Dockerfile
          failure-threshold: warning

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: docker.io/robotsix/mill-sandbox-proxy
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - id: build
        uses: docker/build-push-action@v7
        with:
          # context = sandbox/proxy so the Dockerfile's COPY tinyproxy.conf /
          # COPY filter resolve; `file` is relative to the workspace root
          # (like publish-sandbox's `file: sandbox/Dockerfile`), so it must be
          # the full path — a bare `Dockerfile` resolved to the repo-root mill
          # Dockerfile and failed the build.
          context: sandbox/proxy
          file: sandbox/proxy/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resolve scan image tag
        id: scan-ref
        run: echo "image=$(echo "${{ steps.meta.outputs.tags }}" | head -1)" >> $GITHUB_OUTPUT

      - name: Trivy vulnerability scan (gate)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.scan-ref.outputs.image }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

      - name: Trivy vulnerability scan (SARIF for code-scanning)
        # Only scan when an image was actually built. Without this guard, a
        # failed build leaves scan-ref empty and trivy defaults to `.`, then
        # fails with a misleading "could not parse reference: ." that masks
        # the real build error.
        if: ${{ always() && steps.scan-ref.outputs.image != '' }}
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.scan-ref.outputs.image }}
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        with:
          sarif_file: trivy-results.sarif

      - name: Push Docker image
        id: push
        run: |
          for tag in $(echo "${{ steps.meta.outputs.tags }}"); do
            docker push "$tag"
          done
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${{ steps.scan-ref.outputs.image }}" | cut -d'@' -f2)
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

      - uses: anchore/sbom-action@v0.21.0
        with:
          image: docker.io/robotsix/mill-sandbox-proxy@${{ steps.push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-proxy.cdx.json

      - uses: actions/attest@v4
        with:
          subject-name: docker.io/robotsix/mill-sandbox-proxy
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: sbom-proxy.cdx.json
          push-to-registry: true

      - uses: actions/upload-artifact@v4
        with:
          name: sbom-proxy.cdx.json
          path: sbom-proxy.cdx.json
