name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Existing: semantic-release + PyPI publish ───────────────────────────

  semantic-release:
    if: github.event_name == 'push' && github.ref_type == 'branch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.8.15"
          enable-cache: false
      - name: Python Semantic Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run semantic-release publish

  pypi-publish:
    if: github.event_name == 'release' && github.event.action == 'published'
    permissions:
      id-token: write
      contents: read
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-release.yml@eeced1217f95cc04e514102571282a2ff2d1e3f1
    with:
      python-version: "3.14"
      uv-version: "0.8.15"
      github-release: false

  # ── Docker image publishing (GHCR via shared reusable) ─────────────────

  lint:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: sandbox/Dockerfile
          failure-threshold: warning

      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: sandbox/proxy/Dockerfile
          failure-threshold: warning

  publish-mill:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: lint
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/docker-release.yml@70e26f3a214a20b601e2b415a41bad743a871e22  # 2026-07-02
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    with:
      image-name: ghcr.io/damien-robotsix/robotsix-mill
    secrets: inherit

  publish-sandbox:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: lint
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/docker-release.yml@70e26f3a214a20b601e2b415a41bad743a871e22  # 2026-07-02
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    with:
      image-name: ghcr.io/damien-robotsix/robotsix-mill-sandbox
      dockerfile: sandbox/Dockerfile
    secrets: inherit

  publish-proxy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: lint
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/docker-release.yml@70e26f3a214a20b601e2b415a41bad743a871e22  # 2026-07-02
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    with:
      image-name: ghcr.io/damien-robotsix/robotsix-mill-sandbox-proxy
      dockerfile: sandbox/proxy/Dockerfile
      # context is not exposed by the reusable; sandbox/proxy/Dockerfile
      # uses repo-root-relative COPY paths so context: . (the reusable
      # default) works correctly.
    secrets: inherit

  smoke-mill:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: publish-mill
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image ref
        id: ref
        # The reusable does not expose an image-digest output, so we
        # construct the tag from branch/tag name. docker/metadata-action
        # in the reusable generates:
        #   branch → `main` (type=ref,event=branch)
        #   tag    → `1.2.3` (type=semver,pattern={{version}}, v stripped)
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
            echo "image=ghcr.io/damien-robotsix/robotsix-mill:${TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "image=ghcr.io/damien-robotsix/robotsix-mill:main" >> "$GITHUB_OUTPUT"
          fi

      - name: Assert sandbox-contract tools present (gh)
        env:
          IMAGE: ${{ steps.ref.outputs.image }}
        run: docker run --rm --entrypoint gh "$IMAGE" --version

      - name: Smoke — agent_definitions bundled in production image
        env:
          IMAGE: ${{ steps.ref.outputs.image }}
        run: |
          docker run --rm --entrypoint python "$IMAGE" -c \
            "from robotsix_mill._resources import agent_definitions_dir; p = agent_definitions_dir(); assert p.is_dir(), f'Missing: {p}'"

      - name: Smoke — importlib.metadata version readable in production image
        env:
          IMAGE: ${{ steps.ref.outputs.image }}
        run: |
          docker run --rm --entrypoint python "$IMAGE" -c \
            "from importlib.metadata import metadata; m = metadata('robotsix-mill'); assert m['Version'], 'No version'"

  smoke-sandbox:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: publish-sandbox
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image ref
        id: ref
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
            echo "image=ghcr.io/damien-robotsix/robotsix-mill-sandbox:${TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "image=ghcr.io/damien-robotsix/robotsix-mill-sandbox:main" >> "$GITHUB_OUTPUT"
          fi

      - name: Assert sandbox-contract tools present (gh)
        env:
          IMAGE: ${{ steps.ref.outputs.image }}
        run: docker run --rm --entrypoint gh "$IMAGE" --version

      - name: Assert uv reachable as non-root runtime user
        env:
          IMAGE: ${{ steps.ref.outputs.image }}
        run: docker run --rm --user 1000:1000 -e HOME=/tmp --entrypoint uv "$IMAGE" --version
