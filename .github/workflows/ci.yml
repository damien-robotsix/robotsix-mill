name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6
        with:
          version: "0.8.15"

      - name: Install dev deps
        # Installs from the committed uv.lock; --frozen fails the build
        # if the lock is stale relative to pyproject.toml (no `uv lock`
        # regeneration step — that would silently pull new @main commits
        # of the robotsix-* git deps). See docs/dependencies.md.
        run: uv sync --frozen --extra dev --extra tracing
        env:
          UV_PROJECT_ENVIRONMENT: system

      - name: deptry (dependency hygiene)
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: uv run deptry .

      - name: Validate module taxonomy
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: |
          uv run robotsix-modules validate docs/modules.yaml
          uv run python scripts/validate_module_paths.py

      - name: Ruff (lint + format check)
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: |
          uv run ruff check --output-format=github .
          uv run ruff format --check --diff .

      - name: Mypy (static type check, advisory)
        # Codebase carries pre-existing strict-mode debt (~700 errors
        # across ~90 files) that pre-dates this gate. Mypy runs and
        # surfaces a summary as a CI annotation but does NOT block CI
        # until the backlog is worked off in dedicated tickets. Remove
        # the ``|| true`` once mypy --strict is clean.
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: |
          set +e
          uv run mypy src/ --strict 2>&1 | tee mypy.log
          err_count=$(grep -cE '^src/.*: error:' mypy.log || echo 0)
          echo "::warning::mypy --strict reported ${err_count} pre-existing errors (advisory; not blocking CI)"
          exit 0

      - name: Bandit (security SAST)
        # Severity floor (MEDIUM+) is a deliberate, documented policy —
        # see [tool.bandit] in pyproject.toml / CONTRIBUTING.md.
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: uv run bandit -c pyproject.toml -r src/ --severity-level medium

      - name: Run tests
        env:
          UV_PROJECT_ENVIRONMENT: system
          GIT_BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD~1' }}
        # Docker integration tests (pytest.mark.docker) require the
        # sandbox Docker image and the mill-sandbox-net proxy network
        # — infrastructure that only exists in the full mill deployment,
        # not in GitHub Actions CI. Skip them here.
        run: uv run pytest tests/ -x -m "not docker" --tb=long --cov=robotsix_mill --cov-fail-under=70 --cov-report=term-missing
