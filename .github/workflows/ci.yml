name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    permissions:
      contents: read
      security-events: write
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-ci.yml@5cd8c1facb02299da618979e7a55f1953f9c075a
    with:
      python-version: "3.14"
      uv-version: "0.8.15"
      # `dev` is now a PEP 735 dependency-group, not a package extra; it is
      # pulled in automatically by `[tool.uv] default-groups = ["dev"]` on
      # every `uv sync`, so only the genuine `tracing` extra is listed here.
      install-extras: "tracing"
      cov-package: "robotsix_mill"
      coverage-threshold: 70
      pytest-args: -m "not docker"
      bandit-severity: "medium"
      mypy-advisory: true

  mill-specific:
    runs-on: ubuntu-latest
    env:
      UV_MALWARE_CHECK: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          # Tests read git history (diff vs base ref) but never push;
          # drop the persisted token so it cannot leak via artifacts.
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.8.15"

      - name: Install dev deps
        # `dev` is a PEP 735 dependency-group pulled in automatically via
        # `[tool.uv] default-groups = ["dev"]`; only `tracing` stays an extra.
        run: uv sync --locked --extra tracing
        env:
          UV_PROJECT_ENVIRONMENT: system

      - name: Reject bare string TicketKind literals
        # Mill-domain check (TicketKind) — kept here, not in the shared
        # python-ci.yml that every member repo calls.
        run: python scripts/check_kind_literals.py

      - name: Validate module taxonomy
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: |
          uv run robotsix-modules validate docs/modules.yaml
          uv run python scripts/validate_module_paths.py

      - name: Check file registration
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: |
          uv run python -c "
          import subprocess, sys, yaml
          from pathlib import Path
          from robotsix_modules.validation.registration import check_registration

          taxonomy = yaml.safe_load(Path('docs/modules.yaml').read_text())
          result = subprocess.run(['git', 'ls-files', '-s'],
                                  capture_output=True, text=True)
          if result.returncode != 0:
              print('git ls-files failed', file=sys.stderr)
              sys.exit(2)
          tracked = []
          for line in result.stdout.splitlines():
              if not line.strip():
                  continue
              mode = line[:6]
              path = line.split('\t', 1)[1] if '\t' in line else ''
              if mode != '160000' and path:
                  tracked.append(path)

          findings = check_registration(taxonomy, Path('.'),
                                        tracked_files=tracked)
          if findings:
              for f in findings:
                  print(f.message, file=sys.stderr)
              sys.exit(1)
          print('All tracked files are properly registered.')
          "

      - name: Vulture (dead code)
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: uv run vulture --ignore-decorators "@field_validator,@model_validator" src/ vulture_whitelist.py

      - name: deptry (dependency hygiene)
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: uv run deptry .

      - name: Validate config sync
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: uv run python scripts/check_config_sync.py

      - name: Check config-standard footprint
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: uv run python scripts/check_config_standard_footprint.py

      - name: Validate config.schema.json sync
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: uv run python scripts/emit_config_schema.py --check

      - name: Check workflow pinning
        run: |
          ! grep -nE 'uses:\s*\S+\.github/workflows/[^@]*@(main|master|latest|v\d+)' \
            .github/workflows/*.yml

      - name: Validate workflow permissions
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: uv run python scripts/validate_workflow_permissions.py

      - name: Check shell completions are up-to-date
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: |
          uv run python scripts/gen_completions.py
          git diff --exit-code contrib/completions/ || {
            echo "contrib/completions/ is out of date."
            echo "Run 'make completions' and commit the result."
            exit 1
          }
      - name: Check for un-generated migrations (model/migration drift)
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: |
          DB_URL="sqlite:///${RUNNER_TEMP}/drift-check.db"
          sed -i "s|^sqlalchemy\.url = .*|sqlalchemy.url = $DB_URL|" alembic.ini
          uv run alembic upgrade head
          uv run alembic check

      - name: Lint shell scripts (shellcheck)
        run: shellcheck --severity=warning scripts/*.sh dev/*.sh entrypoint.sh
