name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dev deps
        run: pip install -e '.[dev,tracing]'

      - name: Validate module taxonomy
        run: |
          pip install check-jsonschema
          check-jsonschema --schemafile docs/modules.schema.yaml docs/modules.yaml

      - name: Run jscpd (report-only)
        run: npx jscpd@4 --config .jscpd.json . || true

      - name: Ruff (lint + format check)
        run: |
          ruff check --output-format=github .
          ruff format --check --diff .

      - name: Mypy (static type check, advisory)
        # Codebase carries pre-existing strict-mode debt (~700 errors
        # across ~90 files) that pre-dates this gate. Mypy runs and
        # surfaces a summary as a CI annotation but does NOT block CI
        # until the backlog is worked off in dedicated tickets. Remove
        # the ``|| true`` once mypy --strict is clean.
        run: |
          set +e
          mypy src/ --strict 2>&1 | tee mypy.log
          err_count=$(grep -cE '^src/.*: error:' mypy.log || echo 0)
          echo "::warning::mypy --strict reported ${err_count} pre-existing errors (advisory; not blocking CI)"
          exit 0

      - name: Bandit (security SAST)
        # `--severity-level medium` mirrors the bandit ≤1.8 default
        # (the gate was designed for MEDIUM+; 1.9 widened the default
        # to LOW, which surfaces pre-existing LOWs that are tracked
        # but not currently blocking — same deal as the mypy advisory
        # gate above).
        run: bandit -c pyproject.toml -r src/ --severity-level medium

      - name: Run tests
        env:
          GIT_BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD~1' }}
        run: pytest tests/ -x --tb=long
