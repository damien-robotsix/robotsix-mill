name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[openrouter_deepseek,claude_sdk,dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Type-check (mypy)
        run: mypy src/
      - name: Test with coverage
        run: pytest --cov=src/robotsix_llmio --cov-report=term-missing

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install package + extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[openrouter_deepseek,claude_sdk,dev]"
      - name: Bandit security scan
        run: bandit -r src/ -ll
      - name: Dependency vulnerability audit
        run: |
          pip-audit --format cyclonedx-json --output sbom.json
          pip-audit  # for human-readable report
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v4
