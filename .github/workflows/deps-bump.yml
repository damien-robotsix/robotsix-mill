name: Bump shared-lib lockfile

on:
  workflow_call:
    inputs:
      commit-message:
        required: false
        type: string
        default: "chore(deps): refresh uv.lock (shared-lib bump)"
      pr-title:
        required: false
        type: string
        default: "chore(deps): refresh uv.lock (shared-lib bump)"
      pr-body:
        required: false
        type: string
        default: |
          Automated weekly refresh of `uv.lock` via `uv lock --upgrade`,
          pulling the latest `@main` commits of the robotsix-* shared
          libraries (llmio, board, yaml-config, modules).

          This PR's CI (`ci.yml`) runs the full `pytest` suite — including
          `tests/agents/test_retry.py` — so any semantic change in a shared
          lib surfaces **here**, in the bump PR, rather than silently on
          `main`. Do not merge if CI is red.

          Trade-off (chosen mechanism): a scheduled Actions workflow running
          `uv lock --upgrade` is fully deterministic and self-contained under
          mill's control (vs. Renovate `lockFileMaintenance`, whose `pep621`
          manager does not bump `git+https` refs and which needs the Renovate
          runner to have `uv` + GitHub access). See docs/dependencies.md.
      pr-labels:
        required: false
        type: string
        default: |
          dependencies
          automated
      branch-name:
        required: false
        type: string
        default: "deps/uv-lock-bump"
      uv-version:
        required: false
        type: string
        default: "0.8.15"
    secrets:
      DEPS_BUMP_TOKEN:
        required: true
        description: PAT with contents:write and pull-requests:write to open the bump PR

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4  # zizmor: ignore[artipacked]

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6
        with:
          version: ${{ inputs.uv-version }}

      - name: Refresh lockfile (pull latest @main commits)
        run: uv lock --upgrade

      - name: Open bump PR if the lock changed
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676  # v7.0.11
        with:
          token: ${{ secrets.DEPS_BUMP_TOKEN }}
          add-paths: uv.lock
          branch: ${{ inputs.branch-name }}
          delete-branch: true
          commit-message: ${{ inputs.commit-message }}
          title: ${{ inputs.pr-title }}
          labels: ${{ inputs.pr-labels }}
          body: ${{ inputs.pr-body }}
