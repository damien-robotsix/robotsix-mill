name: Bump shared-lib lockfile

# Periodically refresh uv.lock so new @main commits of the robotsix-*
# shared libraries enter mill ONLY through this PR — whose CI (ci.yml on
# pull_request) runs the full pytest suite. A semantic change in a shared
# lib therefore surfaces in the bump PR's CI, never silently on `main`.
# See docs/dependencies.md for the full pin + bump mechanism and rationale.

on:
  schedule:
    # Weekly, Monday 08:00 UTC (before the Renovate window).
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      # Keep the persisted GITHUB_TOKEN: peter-evans/create-pull-request
      # pushes the bump branch using the credentials checkout writes into
      # .git/config, so persist-credentials: false would break the push.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4  # zizmor: ignore[artipacked]

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6
        with:
          version: "0.8.15"

      - name: Refresh lockfile (pull latest @main commits)
        run: uv lock --upgrade

      - name: Open bump PR if the lock changed
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e  # v7.0.8
        with:
          add-paths: uv.lock
          branch: deps/uv-lock-bump
          delete-branch: true
          commit-message: "chore(deps): refresh uv.lock (shared-lib bump)"
          title: "chore(deps): refresh uv.lock (shared-lib bump)"
          labels: |
            dependencies
            automated
          body: |
            Automated weekly refresh of `uv.lock` via `uv lock --upgrade`,
            pulling the latest `@main` commits of the robotsix-* shared
            libraries (llmio, board, yaml-config, modules).

            This PR's CI (`ci.yml`) runs the full `pytest` suite — including
            `tests/agents/test_retry.py` — so any semantic change in a shared
            lib surfaces **here**, in the bump PR, rather than silently on
            `main`. Do not merge if CI is red.

            Trade-off (chosen mechanism): a scheduled Actions workflow running
            `uv lock --upgrade` is fully deterministic and self-contained under
            mill's control (vs. Renovate `lockFileMaintenance`, whose `pep621`
            manager does not bump `git+https` refs and which needs the Renovate
            runner to have `uv` + GitHub access). See docs/dependencies.md.
