name: Python Docs

on:
  workflow_call:
    inputs:
      docs-install-args:
        description: Dependency-install flags appended to `uv sync --frozen` (free-form string; `--group docs` for mill, `--extra docs` for auto-mail).
        required: false
        type: string
        default: "--group docs"
      python-version:
        description: Python version to set up.
        required: false
        type: string
        default: "3.14"
      uv-version:
        description: uv version to install.
        required: false
        type: string
        default: "0.8.15"
      retries:
        description: Number of `mkdocs gh-deploy` attempts in the retry loop.
        required: false
        type: string
        default: "4"

# No workflow-level concurrency here: in a called workflow `github.workflow`
# resolves to the CALLER's workflow name, so any caller using the common
# `${{ github.workflow }}-${{ github.ref }}` group gets "deadlock was detected
# for concurrency group ... between a top level workflow and 'deploy'" and the
# run fails with zero jobs. Callers own concurrency.

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Keep the persisted GITHUB_TOKEN: `mkdocs gh-deploy` pushes the built
      # site to the gh-pages branch using the credentials checkout writes
      # into .git/config, so persist-credentials: false would break it.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4  # zizmor: ignore[artipacked]

      # Interpreter comes from setup-python (same pattern as ci.yml):
      # the locked griffelib 2.0.2 needs a recent 3.14.x patch
      # (typing._eval_type with prefer_fwd_module), which the uv
      # 0.8.15-managed manifest predates — uv can neither resolve a
      # recent patch by default nor download a pinned one ("No download
      # found for cpython-3.14.5"). setup-python's manifest tracks new
      # patch releases independently of the uv version.
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ inputs.python-version }}

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: ${{ inputs.uv-version }}

      - name: Install docs deps
        env:
          UV_PROJECT_ENVIRONMENT: system
          DOCS_INSTALL_ARGS: ${{ inputs.docs-install-args }}
          RETRIES: ${{ inputs.retries }}
        run: |
          for i in $(seq 1 "$RETRIES"); do
            echo "Attempt $i/$RETRIES..."
            if uv sync --frozen $DOCS_INSTALL_ARGS; then  # shellcheck disable=SC2086 (word splitting intentional: multiple install args)
              echo "Install succeeded on attempt $i/$RETRIES"
              exit 0
            fi
            if [ "$i" -lt "$RETRIES" ]; then
              echo "Attempt $i/$RETRIES failed — retrying in 10s..."
              sleep 10
            fi
          done
          echo "All $RETRIES attempts failed."
          exit 1

      - name: Configure Git
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Deploy to GitHub Pages
        env:
          UV_PROJECT_ENVIRONMENT: system
          RETRIES: ${{ inputs.retries }}
        run: |
          for i in $(seq 1 "$RETRIES"); do
            echo "Attempt $i/$RETRIES..."
            if uv run --frozen mkdocs gh-deploy --force; then
              echo "Deploy succeeded on attempt $i/$RETRIES"
              exit 0
            fi
            if [ "$i" -lt "$RETRIES" ]; then
              echo "Attempt $i/$RETRIES failed — retrying in 10s..."
              sleep 10
            fi
          done
          echo "All $RETRIES attempts failed."
          exit 1
