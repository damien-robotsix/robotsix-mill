name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install project + tracing extras
        run: .venv/bin/pip install ".[tracing]"

      - uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          virtual-environment: .venv/
          local: true
          inputs: .
          # PYSEC-2025-183 (pyjwt): "weak encryption" advisory disputed
          # by the supplier — the algorithm strength is determined by
          # the *key* the caller supplies, not by pyjwt itself. No fix
          # version is published (the "Fix Versions" column is empty
          # in pip-audit's output). pyjwt enters our tree only as a
          # transitive dep (langfuse → pyjwt for OTel auth signing);
          # mill does not call its signing API directly. Re-evaluate
          # if a fix version is ever published.
          #
          # MAL-2026-4750 (fastapi): malicious undeclared dependency
          # "fastar>=0.9.0" was added to the [standard] extras group
          # of fastapi 0.136.3 on PyPI. The mill project depends on
          # "fastapi>=0.115" with NO extras — we never install
          # fastapi[standard], so the malicious package is not pulled
          # into our dependency tree. Remove this ignore if we ever
          # add a [standard] extra or the advisory is fixed upstream.
          ignore-vulns: PYSEC-2025-183,MAL-2026-4750
