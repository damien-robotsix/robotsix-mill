name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.14"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install project + tracing extras
        # robotsix-yaml-config is vendored in-repo (see [tool.uv.sources] in
        # pyproject.toml). pip does not read that table, so install the local
        # copy explicitly to satisfy the runtime dependency.
        run: .venv/bin/pip install ./robotsix-yaml-config ".[tracing]"

      - name: Install pip-audit
        run: .venv/bin/pip install "pip-audit>=2.5.6"

      - name: Audit installed packages
        run: |
          .venv/bin/pip-audit \
            --path . \
            --vulnerability-service pypi \
            --ignore-vuln PYSEC-2025-183 \
            --ignore-vuln MAL-2026-4750
        env:
          # PYSEC-2025-183 (pyjwt): "weak encryption" advisory disputed
          # by the supplier — the algorithm strength is determined by
          # the *key* the caller supplies, not by pyjwt itself. No fix
          # version is published (the "Fix Versions" column is empty
          # in pip-audit's output). pyjwt enters our tree only as a
          # transitive dep (langfuse → pyjwt for OTel auth signing);
          # mill does not call its signing API directly. Re-evaluate
          # if a fix version is ever published.
          #
          # MAL-2026-4750 (fastapi 0.136.3): undocument "fastar" dep
          # injected into fastapi[standard] extras on PyPI.  mill
          # depends on "fastapi>=0.115" (no extras), so fastapi[standard]
          # is never installed & the malicious dep is never pulled.
          GHA_PIP_AUDIT_INTERNAL_BE_CAREFUL_ALLOW_FAILURE: false
