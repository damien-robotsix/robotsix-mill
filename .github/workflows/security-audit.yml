name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install project + tracing extras
        run: .venv/bin/pip install ".[tracing]"

      - name: Install pip-audit
        run: .venv/bin/pip install pip-audit

      - name: Run pip-audit
        run: |
          .venv/bin/pip-audit \
            --local \
            --vulnerability-service PyPI \
            --ignore-vuln PYSEC-2025-183 \
            --ignore-vuln MAL-2026-4750 \
            --inputs .
