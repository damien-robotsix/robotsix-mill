name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          # Audits only read the checked-out tree; no git push.
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: "3.14"

      - name: Install project + tracing extras
        run: uv sync --locked --extra tracing

      - name: Install pip-audit
        run: uv pip install "pip-audit[cyclonedx]>=2.5.6"

      - name: Audit installed packages
        run: |
          uv run pip-audit \
            --path . \
            --vulnerability-service pypi \
            --ignore-vuln PYSEC-2025-183 \
            --ignore-vuln MAL-2026-4750
        env:
          # PYSEC-2025-183 (pyjwt): "weak encryption" advisory disputed
          # by the supplier — the algorithm strength is determined by
          # the *key* the caller supplies, not by pyjwt itself. No fix
          # version is published (the "Fix Versions" column is empty
          # in pip-audit's output). pyjwt is a direct dependency
          # (pyjwt[crypto]>=2 in pyproject.toml) and also transitive
          # via langfuse (tracing extra). mill calls jwt.encode()
          # directly with RS256 in forge/auth.py to mint GitHub App
          # bearer tokens. This is safe because the caller supplies
          # its own RSA private key (a GitHub App key ≥2048 bits);
          # the advisory's concern (weak keys) is mitigated — key
          # strength is the caller's responsibility, and our caller
          # supplies strong keys. Re-evaluate if a fix version is
          # ever published.
          #
          # MAL-2026-4750 (fastapi 0.136.3): undocument "fastar" dep
          # injected into fastapi[standard] extras on PyPI.  mill
          # depends on "fastapi>=0.115" (no extras), so fastapi[standard]
          # is never installed & the malicious dep is never pulled.
          # Advisory has since been withdrawn from the OSV database
          # (2026); retained for documentation.
          GHA_PIP_AUDIT_INTERNAL_BE_CAREFUL_ALLOW_FAILURE: false

      - name: Generate SBOM (CycloneDX)
        if: always()
        run: |
          uv run pip-audit \
            --path . \
            --format cyclonedx-json \
            --output sbom.json || true

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sbom
          path: sbom.json
          if-no-files-found: error

  license-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          # Audits only read the checked-out tree; no git push.
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: "3.14"

      - name: Install project + tracing extras
        run: uv sync --locked --extra tracing

      - name: Install pip-licenses
        run: uv pip install "pip-licenses>=5"

      - name: Audit dependency licenses (allowlist gate)
        run: |
          # Allowlist gate: pip-licenses exits non-zero on ANY installed
          # dependency whose license is not explicitly permitted below.
          # Unlike a denylist, an allowlist also fails on UNKNOWN/unlicensed
          # packages — copyleft AND unlicensed deps are both rejected.
          # --allow-only is the real enforcement; --fail-on is kept as
          # belt-and-suspenders that documents the copyleft intent explicitly.
          #
          # The --allow-only strings are the EXACT license names that
          # `pip-licenses --from=mixed` emits from installed-package metadata
          # (PEP 639 License-Expression + Trove classifiers, classifier-first)
          # for the current `.[tracing]` dependency tree — they are NOT bare
          # SPDX ids and must match verbatim. They cover the permissive
          # families this MIT-licensed project accepts: MIT, Apache-2.0, BSD
          # (2/3-clause), ISC, PSF, MPL-2.0 and Unlicense, including the
          # compound "A OR B" / "A AND B" expressions pip-licenses reports as
          # a single atomic token. Policy lives here (CLI flags + comments),
          # not in a separate .licenserc/.scancode file — same inline-policy
          # convention as pip-audit's --ignore-vuln and Bandit's [tool.bandit].
          #
          # --ignore-packages is the per-package escape hatch, analogous to
          # pip-audit's --ignore-vuln and Trivy's .trivyignore. It suppresses
          # individual packages that are verifiably permissive-licensed but
          # whose metadata format the allowlist cannot match — NOT a way to
          # bypass the copyleft/unknown gate, which stays in force for every
          # other dependency. Two cases here:
          #   1. First-party robotsix code installed from a git ref. All are
          #      MIT (this repo and its sibling libraries ship a MIT LICENSE),
          #      but a pip install from a git ref can surface UNKNOWN license
          #      metadata, which the allowlist would otherwise reject.
          #   2. Third-party packages that ship the FULL license text in the
          #      `License:` metadata field with no license Trove classifier:
          #      `--from=mixed` then emits the whole multi-line text as the
          #      "license name", so the short allowlist tokens can't match.
          ignore_packages=(
            robotsix-mill         # this project itself; MIT (see LICENSE), git/editable install may report UNKNOWN
            robotsix-llmio        # first-party MIT lib, git dep (git+https://github.com/damien-robotsix/robotsix-llmio)
            robotsix-yaml-config  # first-party MIT lib, git dep (git+https://github.com/damien-robotsix/robotsix-yaml-config)
            robotsix-modules      # first-party MIT lib, transitive git dep of robotsix-llmio / robotsix-mill
            tiktoken              # MIT (OpenAI; verified license text in metadata) but ships full MIT text as License field w/ no classifier, so --from=mixed reports the whole blob and the allowlist tokens can't match
          )
          uv run pip-licenses \
            --from=mixed \
            --allow-only="MIT;MIT License;Apache-2.0;Apache Software License;BSD License;BSD-2-Clause;BSD-3-Clause;3-Clause BSD License;ISC;ISC License (ISCL);PSF-2.0;Python Software Foundation License;Mozilla Public License 2.0 (MPL 2.0);MPL-2.0;The Unlicense (Unlicense);Apache-2.0 OR BSD-3-Clause;Apache-2.0 OR BSD-2-Clause;MIT OR Apache-2.0;MIT AND PSF-2.0;MPL-2.0 AND MIT;Apache-2.0 AND CNRI-Python;Apache-2.0 AND BSD-2-Clause" \
            --ignore-packages "${ignore_packages[@]}" \
            --fail-on="GPL;AGPL;LGPL"

  workflow-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          # Audits only read the checked-out tree; no git push.
          persist-credentials: false

      - name: Lint workflow syntax (actionlint)
        run: |
          bash <(curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.12
          ./actionlint -color

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: "3.14"

      - name: Create virtual environment
        run: uv venv

      - name: Install zizmor
        run: uv pip install "zizmor==1.25.2"

      # zizmor statically audits the GitHub Actions workflows for
      # supply-chain risks (over-permissioned jobs, template-injection
      # sinks, unpinned/risky `uses:`, credential persistence). It exits
      # non-zero (10 + severity rank) once a finding meets/exceeds its
      # default severity threshold, which gates the job — do NOT swallow
      # the exit code with `|| true`. The online audits authenticate via
      # GH_TOKEN. No job-level `permissions:` block: the job inherits the
      # workflow's top-level `permissions: contents: read` (a job-level
      # block would replace it entirely), which is sufficient for checkout
      # plus zizmor's GitHub-API audits. Surfacing results via SARIF to the
      # code-scanning dashboard is a possible follow-up — it would need
      # `security-events: write`, so it is deferred; the job already
      # surfaces findings by failing the PR check.
      - name: Audit GitHub Actions workflows
        run: uv run zizmor .github/workflows/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
