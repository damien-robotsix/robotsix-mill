name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Keep the persisted GITHUB_TOKEN: `mkdocs gh-deploy` pushes the built
      # site to the gh-pages branch using the credentials checkout writes
      # into .git/config, so persist-credentials: false would break it.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4  # zizmor: ignore[artipacked]

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6
        with:
          version: "0.8.15"

      - name: Install docs deps
        run: uv sync --frozen --extra docs
        env:
          UV_PROJECT_ENVIRONMENT: system

      - name: Configure Git
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Deploy to GitHub Pages
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: |
          for i in 1 2 3 4; do
            echo "Attempt $i/4..."
            if uv run --frozen mkdocs gh-deploy --force; then
              echo "Deploy succeeded on attempt $i/4"
              exit 0
            fi
            if [ "$i" -lt 4 ]; then
              echo "Attempt $i/4 failed — retrying in 10s..."
              sleep 10
            fi
          done
          echo "All 4 attempts failed."
          exit 1
