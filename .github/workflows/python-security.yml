name: Python Security

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to set up.
        required: false
        type: string
        default: "3.14"
      uv-version:
        description: uv version to install.
        required: false
        type: string
        default: "0.8.15"
      install-extras:
        description: Space-separated extras expanded into repeated --extra flags on uv sync --frozen. The dev group arrives automatically via [tool.uv] default-groups.
        required: false
        type: string
        default: "tracing"
      runs-on:
        description: Runner label for the security job.
        required: false
        type: string
        default: "ubuntu-latest"
      run-trufflehog:
        description: Whether to run the TruffleHog secret-scanning step.
        required: false
        type: boolean
        default: true
      trufflehog-pr-diff:
        description: When true, scan only the PR diff (base/head SHAs); when false, scan the full checkout.
        required: false
        type: boolean
        default: false
      trufflehog-extra-args:
        description: Extra args forwarded to the TruffleHog action's extra_args input.
        required: false
        type: string
        default: ""
      run-pip-audit:
        description: Whether to run the pip-audit dependency vulnerability step.
        required: false
        type: boolean
        default: true
      pip-audit-requirements-file:
        description: When non-empty, uv export to this path and audit it with pip-audit -r; when empty, run uv run pip-audit against the synced env.
        required: false
        type: string
        default: ""
      pip-audit-ignore-packages:
        description: Space-separated package names expanded into repeated --no-emit-package flags on the uv export step (only used when pip-audit-requirements-file is set).
        required: false
        type: string
        default: ""
      pip-audit-ignore-vulns:
        description: Space-separated vuln IDs expanded into repeated --ignore-vuln flags on pip-audit.
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  security:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          # PR-diff TruffleHog needs full history to resolve base..head.
          fetch-depth: 0
          # Audits only read the checked-out tree; no git push.
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ inputs.python-version }}

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: ${{ inputs.uv-version }}

      - name: Install deps
        # Installs from the committed uv.lock; --frozen fails the build
        # if the lock is stale relative to pyproject.toml. Inputs are
        # passed via env, not inline ``${{ }}`` interpolation into the
        # run block, to avoid template injection (zizmor).
        run: |
          extras=""
          for x in $INSTALL_EXTRAS; do  # shellcheck disable=SC2086 (word splitting intentional: multiple --extra flags)
            extras="$extras --extra $x"
          done
          uv sync --frozen $extras  # shellcheck disable=SC2086 (word splitting intentional: multiple --extra flags)
        env:
          UV_PROJECT_ENVIRONMENT: system
          INSTALL_EXTRAS: ${{ inputs.install-extras }}

      - name: TruffleHog (PR diff scan)
        if: ${{ inputs.run-trufflehog && inputs.trufflehog-pr-diff && github.event_name == 'pull_request' }}
        # Pin: human follow-up — confirm/refresh this SHA against the
        # intended trufflesecurity/trufflehog release (resolved offline).
        uses: trufflesecurity/trufflehog@853e1e8d249fd1e29d0fcc7280d29b03df3d643d  # v3.88.4
        with:
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: ${{ inputs.trufflehog-extra-args }}

      - name: TruffleHog (full scan)
        if: ${{ inputs.run-trufflehog && !inputs.trufflehog-pr-diff }}
        # Pin: human follow-up — confirm/refresh this SHA against the
        # intended trufflesecurity/trufflehog release (resolved offline).
        uses: trufflesecurity/trufflehog@853e1e8d249fd1e29d0fcc7280d29b03df3d643d  # v3.88.4
        with:
          path: ./
          extra_args: ${{ inputs.trufflehog-extra-args }}

      - name: pip-audit (locked requirements file)
        if: ${{ inputs.run-pip-audit && inputs.pip-audit-requirements-file != '' }}
        # Inputs flow through env, never inline into the run block, to
        # avoid template injection (zizmor).
        env:
          UV_PROJECT_ENVIRONMENT: system
          PIP_AUDIT_REQUIREMENTS_FILE: ${{ inputs.pip-audit-requirements-file }}
          PIP_AUDIT_IGNORE_PACKAGES: ${{ inputs.pip-audit-ignore-packages }}
          PIP_AUDIT_IGNORE_VULNS: ${{ inputs.pip-audit-ignore-vulns }}
        run: |
          no_emit=""
          for p in $PIP_AUDIT_IGNORE_PACKAGES; do  # shellcheck disable=SC2086 (word splitting intentional: multiple package names)
            no_emit="$no_emit --no-emit-package $p"
          done
          uv export --frozen --no-emit-project $no_emit -o "$PIP_AUDIT_REQUIREMENTS_FILE"  # shellcheck disable=SC2086 (word splitting intentional: multiple --no-emit-package flags)
          ignore=""
          for v in $PIP_AUDIT_IGNORE_VULNS; do  # shellcheck disable=SC2086 (word splitting intentional: multiple vuln IDs)
            ignore="$ignore --ignore-vuln $v"
          done
          uv run --with pip-audit pip-audit -r "$PIP_AUDIT_REQUIREMENTS_FILE" $ignore  # shellcheck disable=SC2086 (word splitting intentional: multiple --ignore-vuln flags)

      - name: pip-audit (synced environment)
        if: ${{ inputs.run-pip-audit && inputs.pip-audit-requirements-file == '' }}
        env:
          UV_PROJECT_ENVIRONMENT: system
          PIP_AUDIT_IGNORE_VULNS: ${{ inputs.pip-audit-ignore-vulns }}
        run: |
          ignore=""
          for v in $PIP_AUDIT_IGNORE_VULNS; do  # shellcheck disable=SC2086 (word splitting intentional: multiple vuln IDs)
            ignore="$ignore --ignore-vuln $v"
          done
          uv run --with pip-audit pip-audit $ignore  # shellcheck disable=SC2086 (word splitting intentional: multiple --ignore-vuln flags)

      - name: Generate SBOM (CycloneDX)
        if: always()
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: uv run --with pip-audit pip-audit --format cyclonedx-json --output sbom.json || true

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sbom
          path: sbom.json
          if-no-files-found: error
