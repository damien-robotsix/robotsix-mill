name: Python CI

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to set up.
        required: false
        type: string
        default: "3.14"
      uv-version:
        description: uv version to install.
        required: false
        type: string
        default: "0.8.15"
      install-extras:
        description: Space-separated extras expanded into repeated --extra flags on uv sync --frozen. The dev group arrives automatically via [tool.uv] default-groups.
        required: false
        type: string
        default: "tracing"
      cov-package:
        description: Package passed to pytest --cov=<pkg>.
        required: false
        type: string
        default: "robotsix_mill"
      coverage-threshold:
        description: Value for pytest --cov-fail-under.
        required: false
        type: string
        default: "70"
      pytest-args:
        description: Extra pytest selectors/markers.
        required: false
        type: string
        default: -m "not docker"
      pytest-numprocesses:
        description: Value passed to pytest-xdist -n (e.g. "auto" or a fixed int like "4" for runners whose advertised cores exceed real vCPUs).
        required: false
        type: string
        default: "auto"
      runs-on:
        description: Runner label for the tests job.
        required: false
        type: string
        default: "ubuntu-latest"
      run-deptry:
        description: Whether to run the deptry dependency-hygiene step.
        required: false
        type: boolean
        default: true
      run-bandit:
        description: Whether to run the bandit security SAST step.
        required: false
        type: boolean
        default: true
      bandit-severity:
        description: Severity floor passed to bandit --severity-level.
        required: false
        type: string
        default: "medium"
      mypy-advisory:
        description: When true, mypy runs but never blocks CI; when false, mypy failures block.
        required: false
        type: boolean
        default: true

jobs:
  tests:
    runs-on: ${{ inputs.runs-on }}
    permissions:
      # contents:read is REQUIRED for actions/checkout to clone PRIVATE
      # caller repos. Declaring any permissions block resets all unlisted
      # scopes to `none`; without contents:read the checkout of a private
      # consumer fails with "Repository not found" (public callers are
      # unaffected — their clone needs no token). security-events:write is
      # for the SARIF upload.
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          # Lint/tests read git history but never push; drop the
          # persisted token so it cannot leak via artifacts.
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ inputs.python-version }}

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6
        with:
          version: ${{ inputs.uv-version }}

      - name: Install dev deps
        # Installs from the committed uv.lock; --frozen fails the build
        # if the lock is stale relative to pyproject.toml (no `uv lock`
        # regeneration step — that would silently pull new @main commits
        # of the robotsix-* git deps). See docs/dependencies.md.
        # Inputs are passed via env, not inline ``${{ }}`` interpolation
        # into the run block, to avoid template injection (zizmor).
        run: |
          extras=""
          for x in $INSTALL_EXTRAS; do
            extras="$extras --extra $x"
          done
          uv sync --frozen $extras
        env:
          UV_PROJECT_ENVIRONMENT: system
          INSTALL_EXTRAS: ${{ inputs.install-extras }}

      - name: deptry (dependency hygiene)
        if: ${{ inputs.run-deptry }}
        env:
          UV_PROJECT_ENVIRONMENT: system
        # Provision deptry via --with so consumers need not declare it as a
        # dev dependency (mirrors the bandit step). A bare `uv run deptry`
        # fails with "Failed to spawn: deptry" for any repo that doesn't
        # ship deptry itself.
        run: uv run --with deptry deptry .

      - name: Ruff (lint + format check)
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: |
          uv run ruff check --output-format=github .
          uv run ruff format --check --diff .

      - name: Mypy (static type check, baseline ratchet)
        if: ${{ inputs.mypy-advisory }}
        # Ratchets against a committed mypy-baseline.txt snapshot: known
        # pre-existing strict-mode errors (~1,100 across ~140 files) are
        # tolerated, but any *new* error not in the baseline blocks CI.
        # To shrink the baseline after fixing errors, run:
        #   uv run mypy src/ --strict | uv run mypy-baseline sync
        # and commit the updated mypy-baseline.txt.
        env:
          UV_PROJECT_ENVIRONMENT: system
        # mypy-baseline provisioned via --with (consumers need not declare it).
        run: uv run mypy src/ --strict | uv run --with mypy-baseline mypy-baseline filter

      - name: Mypy (baseline burndown nudge)
        if: ${{ inputs.mypy-advisory }}
        # Surfaces one pre-existing error from the baseline as a CI
        # annotation to encourage incremental burndown. Non-blocking.
        env:
          UV_PROJECT_ENVIRONMENT: system
        # CI checks out in detached HEAD with only the remote-tracking
        # ref available, so point suggest's git-diff at origin/main
        # (the default "main" is not a local branch here).
        run: uv run --with mypy-baseline mypy-baseline suggest --exit-zero --default-branch origin/main

      - name: Mypy (static type check)
        if: ${{ !inputs.mypy-advisory }}
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: uv run mypy src/ --strict

      - name: Bandit (security SAST)
        if: ${{ inputs.run-bandit }}
        # Severity floor (MEDIUM+) is a deliberate, documented policy —
        # see [tool.bandit] in pyproject.toml / CONTRIBUTING.md.
        env:
          UV_PROJECT_ENVIRONMENT: system
          BANDIT_SEVERITY: ${{ inputs.bandit-severity }}
        run: uv run --with 'bandit[toml]' bandit -c pyproject.toml -r src/ --severity-level "$BANDIT_SEVERITY"

      - name: Run tests
        env:
          UV_PROJECT_ENVIRONMENT: system
          GIT_BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD~1' }}
          PYTEST_EXTRA_ARGS: ${{ inputs.pytest-args }}
          PYTEST_NUMPROCESSES: ${{ inputs.pytest-numprocesses }}
          COV_PACKAGE: ${{ inputs.cov-package }}
          COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}
        # Docker integration tests (pytest.mark.docker) require the
        # sandbox Docker image and the mill-sandbox-net proxy network
        # — infrastructure that only exists in the full mill deployment,
        # not in GitHub Actions CI. Skip them here.
        # PYTEST_EXTRA_ARGS carries shell-quoted pytest flags (e.g.
        # ``-m "not docker"``); ``eval set --`` re-parses the quoting so
        # the marker expression arrives as ONE argument (plain unquoted
        # expansion would word-split it into literal-quote fragments and
        # pytest would collect 0 tests).
        run: |
          eval "set -- $PYTEST_EXTRA_ARGS"
          uv run pytest tests/ -n "$PYTEST_NUMPROCESSES" --dist loadscope -x "$@" --tb=long --cov="$COV_PACKAGE" --cov-fail-under="$COVERAGE_THRESHOLD" --cov-report=term-missing
