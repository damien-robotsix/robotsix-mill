name: Python Release

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to set up.
        required: false
        type: string
        default: "3.14"
      uv-version:
        description: uv version to install.
        required: false
        type: string
        default: "0.8.15"
      github-release:
        description: Whether to run the optional GitHub-release job that attaches the built distributions to the release.
        required: false
        type: boolean
        default: false
      runs-on:
        description: Runner label for the jobs.
        required: false
        type: string
        default: "ubuntu-latest"

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          # The build never pushes; drop the persisted token so it
          # cannot leak via artifacts (mirror python-ci.yml).
          persist-credentials: false

      # Two-step interpreter setup matches python-ci.yml: setup-python
      # pins the interpreter, setup-uv installs the uv build frontend.
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ inputs.python-version }}

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6
        with:
          version: ${{ inputs.uv-version }}

      - name: Build sdist + wheel
        run: uv build

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: python-package-distributions
          path: dist/

  github-release:
    if: ${{ inputs.github-release }}
    needs: build
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: python-package-distributions
          path: dist/

      # superfluous-actions: this advisory suggests `gh release upload`
      # in a script step. We keep softprops/action-gh-release because it
      # attaches the built distributions to the triggering release event
      # without the caller having to thread a tag name through this
      # reusable workflow. Pinned by SHA; advisory is informational only.
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2  # zizmor: ignore[superfluous-actions]
        with:
          files: dist/*

  publish:
    needs: build
    runs-on: ${{ inputs.runs-on }}
    permissions:
      # OIDC trusted publishing — no PyPI API token needed.
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: python-package-distributions
          path: dist/

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
