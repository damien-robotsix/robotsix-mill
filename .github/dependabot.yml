# Dependency graph submission and version updates are handled by Renovate;
# the native Dependabot "uv" graph-submission job has been failing
# repeatedly (see tickets 20260626T132643Z through 20260626T213027Z) due
# to Dependabot's internal infrastructure not reliably supporting Python
# 3.14 lockfiles with git dependencies.  All three ecosystems below use
# open-pull-requests-limit: 0 to disable Dependabot processing entirely
# (no version-update PRs and no graph submission).
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 0

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 0

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 0
