# Dependency graph submission is handled by Renovate; the native "uv"
# ecosystem graph-submission job has been failing repeatedly (see tickets
# 20260626T132643Z through 20260626T213027Z) due to Dependabot's internal
# infrastructure not reliably supporting Python 3.14 lockfiles with git
# dependencies.  Version updates remain with Renovate.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 0

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 0
