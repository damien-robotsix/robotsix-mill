# Dependency graph submission and version updates are handled by Renovate.
# The native Dependabot `uv` graph-submission job previously failed because
# Dependabot's infrastructure did not support Python 3.14 lockfiles with
# git dependencies.  Those limitations have since been fixed upstream
# (Python 3.14 version-list patch landed May 2026; git-dep handling fixed
# in PR #14704/#15217).  The `uv` ecosystem is listed below with
# open-pull-requests-limit: 0 to suppress version-update PRs while allowing
# the native graph-submission check to pass.
# The `github_actions` ecosystem is omitted because Dependabot's parser
# cannot handle cross-org `uses:` lines with `.github/workflows/` path
# components, and no upstream fix is available.  A custom dependency-
# submission workflow cannot replace the native check for either ecosystem:
# when the dependency graph is enabled, the built-in job pre-empts custom
# workflows (the custom action simply does not run).
version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 0

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 0
