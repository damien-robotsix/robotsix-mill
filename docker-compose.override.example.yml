# Local development override — hermetic local build.
#
# Copy to docker-compose.override.yml (git-ignored), then run as usual;
# Docker Compose merges both files automatically:
#   cp docker-compose.override.example.yml docker-compose.override.yml
#   docker compose up -d --build mill
#
# Why this exists:
#  - base docker-compose.yml runs the PUBLISHED image
#    (robotsix/mill:latest from Docker Hub) + watchtower auto-update —
#    that's for deployment hosts.
#  - For dev you want YOUR code. `build: .` builds from the local
#    Dockerfile, and a DEDICATED `robotsix/mill:dev` tag keeps it from
#    colliding with Hub's :latest (so a stray pull / watchtower can
#    never swap your build out from under you).
#  - The implement test-gate sandbox must run the SAME local build, so
#    pin `sandbox.image: robotsix/mill:dev` in config/config.json
#    alongside the other host-local YAML overrides (no env vars — the
#    MILL_* aliases were retired with 9cd2630).
#
# Run only the `mill` service locally (the base `watchtower` service is
# for deployment, not dev): `docker compose up -d --build mill`.

services:
  mill:
    build:
      context: .
      target: dev
      args:
        MILL_BUILD_SHA: ${MILL_BUILD_SHA:-}
    image: robotsix/mill:dev
    volumes:
      # Claude SDK backend auth (only needed when llm_backend: claude_sdk, or
      # an agent is in claude_sdk_agents). Mount the host's whole ~/.claude dir
      # READ-WRITE so the in-container `claude` CLI sees the full login state
      # (not just the token) AND can persist its periodic OAuth-token refresh.
      #
      # Do NOT mount just .credentials.json :ro — two traps:
      #  1. The CLI reports "Not logged in" without the rest of the dir's state.
      #  2. A single-file mount pins the inode at container-create; when the
      #     host CLI refreshes the token (atomic rename → new inode) the
      #     container keeps seeing the STALE file until a force-recreate.
      # The host uid (typically 1000) must match the container's `mill` user
      # (uid 1000) for the rw writes to work.
      #
      # NOTE: the container's bundled `claude` CLI version (from the
      # claude-agent-sdk Python dep) must be compatible with the host's
      # (the credential file format can differ across versions) — rebuild
      # the image if the host CLI has moved ahead. Heads-up: this is
      # a LIVE rw share with your own ~/.claude, so the container's CLI and
      # any interactive `claude` session on the host write the same files.
      - ${HOME}/.claude:/home/mill/.claude
