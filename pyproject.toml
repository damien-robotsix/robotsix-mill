[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "robotsix-llmio"
version = "0.1.0"
description = "Provider-agnostic LLM I/O for pydantic-ai agents, with derived per-provider layers (e.g. openrouter_deepseek)."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Damien SIX", email = "damien.robotsix@gmail.com" }]
dependencies = [
    # SLIM, not the full meta-package: the meta pulls every provider SDK plus
    # logfire (which auto-imports opentelemetry via a pydantic plugin) — we
    # keep the dependency surface minimal and let extras add provider support.
    "pydantic-ai-slim>=1.0",
    "httpx",
]

[project.optional-dependencies]
# Layer 2 — OpenRouter transport (OpenAIChatModel over the OpenRouter provider).
# The `openrouter` extra already pulls `openai` transitively (it's what
# OpenAIChatModel runs on), so listing `openai` explicitly is redundant.
openrouter = ["pydantic-ai-slim[openrouter]>=1.0"]
# Layer 3 — derived DeepSeek provider. Chains the openrouter extra.
openrouter_deepseek = ["robotsix-llmio[openrouter]"]
# Layer 2 (sibling) — Claude Agent SDK transport. No API key: authenticates via
# the local `claude login` subscription by spawning the `claude` CLI. Requires
# Node.js + a logged-in `claude` CLI at runtime (not pip-installable).
claude_sdk = ["claude-agent-sdk>=0.2"]
# Optional: emit cost/usage onto the active OpenTelemetry span.
tracing = ["opentelemetry-api", "opentelemetry-sdk"]
dev = ["pytest", "pytest-cov", "ruff", "mypy", "bandit", "pip-audit", "openai"]

[tool.hatch.build.targets.wheel]
packages = ["src/robotsix_llmio"]

[tool.ruff]
line-length = 88

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = false
warn_unused_configs = true

[[tool.mypy.overrides]]
module = "robotsix_llmio.openrouter_deepseek.*"
disable_error_code = ["typeddict-item", "override", "misc", "literal-required"]

[tool.pytest.ini_options]
testpaths = ["tests"]
# Live tests are opt-in: deselected by default so a plain `pytest` (and CI)
# never hits the network. Run them explicitly with `pytest -m live` (which
# overrides this) — they still self-skip without OPENROUTER_API_KEY.
addopts = "-m 'not live'"
markers = [
    "live: tests that require a live API connection and OPENROUTER_API_KEY",
]
