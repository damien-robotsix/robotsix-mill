[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "robotsix-auto-mail"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = [
    "pyyaml>=6.0",
    "urllib3>=2.0",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "ruff",
    "mypy",
    "pytest",
    "hatchling",
    "types-PyYAML",
    "pydantic-ai-slim[openrouter]>=1.0",
]
llm = [
    "pydantic-ai-slim[openrouter]>=1.0",
]

[tool.ruff]
target-version = "py312"
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I", "S", "B", "N", "RUF"]

[tool.ruff.lint.per-file-ignores]
"src/robotsix_auto_mail/detect.py" = ["E501"]
"tests/**/*.py" = ["S101", "S105", "S106"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.bandit]
skips = ["B107"]

[project.scripts]
robotsix-auto-mail = "robotsix_auto_mail.cli:main"

[tool.mypy]
strict = true
python_version = "3.12"
packages = ["src/robotsix_auto_mail"]

