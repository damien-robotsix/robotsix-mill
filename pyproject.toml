[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "robotsix-mill"
version = "0.0.1"
description = "Self-contained LLM-driven ticket solver. SQLite-backed management plane + file workspaces, event-driven worker, delivers merge requests to GitHub/GitLab."
readme = "README.md"
requires-python = ">=3.14"
license = "MIT"
authors = [{ name = "Damien Robotsix" }]
dependencies = [
    "pydantic>=2",
    "pydantic-ai-slim[openrouter,openai]>=1.0",
    # LLM I/O (OpenRouter model construction, DeepSeek pin, per-tier reasoning,
    # cost, retry/transient) extracted to a standalone library. See
    # agents/openrouter_cost.py + agents/retry.py (now thin shims).
    "robotsix-llmio[openrouter_deepseek,claude_sdk] @ git+https://github.com/damien-robotsix/robotsix-llmio@main",
    "pydantic-settings>=2",
    "pyyaml>=6",
    "sqlmodel>=0.0.22",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "httpx>=0.27",
    "pyjwt[crypto]>=2",
]

[project.optional-dependencies]
# Tracing is opt-in: nothing here is imported unless LANGFUSE_* is set.
tracing = [
    "langfuse>=3",
    "opentelemetry-sdk",
    "opentelemetry-exporter-otlp-proto-http",
]
# ruff is PINNED (== not >=): CI runs `uv run ruff`, which otherwise resolves
# the latest release while the sandbox image + local envs sit on an older one
# — so `ruff format --check` flip-flops and turns CI red on formatting the
# agent (and humans) already consider clean. Pin so CI, the sandbox, and local
# format identically. Bump deliberately, reformatting the repo in the same commit.
# Module-taxonomy JSON Schema and validation CLI extracted to a standalone
# library. Consumed only via pre-commit / CI (the `robotsix-modules validate`
# step + the validate-module-taxonomy hook); no Python import in mill. It is a
# CI/dev-only tool, so it lives here rather than in runtime dependencies — that
# keeps it out of the pip-based audit install and the runtime image. Resolved
# from the vendored ./robotsix-modules copy via [tool.uv.sources] below.
dev = ["pytest>=8", "pytest-asyncio>=0.21", "pytest-cov>=7", "bandit[toml]>=1.8", "mypy>=1.15", "ruff==0.15.15", "deptry>=0.25", "robotsix-modules"]
docs = ["mkdocs-material>=9"]

[project.scripts]
robotsix-mill = "robotsix_mill.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/robotsix_mill"]

# Allow the direct git reference for robotsix-llmio in project.dependencies.
[tool.hatch.metadata]
allow-direct-references = true

# robotsix-modules is published as a standalone library, but a copy is vendored
# in-repo (./robotsix-modules, version 0.1.0 — the same as the v0.1.0 tag). uv
# resolves the dev-group dependency from this local path so the taxonomy-
# validation CI step works without cloning the (credentialed) source repo.
[tool.uv.sources]
robotsix-modules = { path = "robotsix-modules" }

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.coverage.report]
precision = 2
show_missing = true

[tool.bandit]
# Run with: pre-commit run bandit --all-files
# (uses `-c pyproject.toml` via the pre-commit hook args)
#
# Severity floor: MEDIUM+.  CI runs with `--severity-level medium`,
# mirroring the Bandit ≤1.8 default.  Bandit ≥1.9 widened the default
# to LOW, surfacing pre-existing LOW findings that are tracked but
# intentionally non-blocking.  Lowering to LOW+ is a future decision
# requiring a triage pass of the existing LOW backlog.
targets = ["src/"]
exclude_dirs = ["tests/"]
skips = ["B101"]

[tool.ruff.lint]
extend-select = ["DTZ001", "DTZ002", "DTZ003", "C90"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.per-file-ignores]
# test_datetime_utils.py exercises TZDateTime's handling of naive
# datetime inputs on purpose — DTZ001 (no tzinfo) is the contract
# under test, not a defect.
"tests/core/test_datetime_utils.py" = ["DTZ001"]
# Pre-existing test fixture factories that exceed C901's default
# complexity threshold. Rewriting them is out of scope for the
# lint-debt cleanup pass; revisit when the surrounding test files
# get refactored.
"tests/runtime/test_worker.py" = ["C901"]
"tests/runtime/test_api.py" = ["C901"]
"tests/cli/test_cli.py" = ["C901"]
# --- src/ legacy hot spots --------------------------------------------------
# Cross-module re-exports of periodic_runner helpers. Each *_runner
# stub re-exports ``_clone_token`` etc. so the worker can import them
# from the stub; the names look "unused" to ruff but are public API.
"src/robotsix_mill/agent_check_runner.py" = ["F401"]
"src/robotsix_mill/audit_runner.py" = ["F401"]
"src/robotsix_mill/bc_check_runner.py" = ["F401"]
"src/robotsix_mill/module_curator_runner.py" = ["F401"]
"src/robotsix_mill/survey_runner.py" = ["F401"]
# F821 in these files: string-typed annotations referencing types
# that are intentionally imported lazily inside the function body
# (httpx, AgentDefinition, AgentHandle, RepoConfig, Path) — the
# strings stay correct at runtime; ruff would only be appeased by
# a TYPE_CHECKING block, which is out of scope for the cleanup pass.
"src/robotsix_mill/agents/base.py" = ["F821"]
"src/robotsix_mill/agents/expert_manager.py" = ["F821"]
# C901 complexity: pre-existing legacy functions that exceed the
# default threshold. Each refactor would touch its own ticket — list
# the files here so the gate keeps holding new debt at bay without
# blocking on a sweep.
"src/robotsix_mill/agents/answering.py" = ["C901"]
"src/robotsix_mill/agents/consult_expert.py" = ["C901"]
"src/robotsix_mill/agents/coordinating.py" = ["C901"]
"src/robotsix_mill/agents/fs_tools.py" = ["C901"]
"src/robotsix_mill/agents/openrouter_cost.py" = ["C901"]
"src/robotsix_mill/agents/read_ticket.py" = ["C901"]
"src/robotsix_mill/agents/report_issue.py" = ["C901"]
"src/robotsix_mill/agents/retry.py" = ["C901"]
"src/robotsix_mill/agents/trace_inspector.py" = ["C901"]
"src/robotsix_mill/cli.py" = ["C901"]
"src/robotsix_mill/cost_reconciliation_runner.py" = ["C901"]
"src/robotsix_mill/langfuse_client.py" = ["C901", "DTZ003", "E731"]
"src/robotsix_mill/runtime/routes.py" = ["F821", "C901"]
"src/robotsix_mill/runtime/routes/_tickets.py" = ["C901"]
"src/robotsix_mill/runtime/routes/_traces.py" = ["C901"]
"src/robotsix_mill/runtime/worker.py" = ["C901"]
"src/robotsix_mill/stages/implement.py" = ["C901"]
"src/robotsix_mill/stages/refine.py" = ["C901"]
"src/robotsix_mill/stages/retrospect.py" = ["F821", "C901"]
"src/robotsix_mill/stages/review.py" = ["C901"]
"src/robotsix_mill/stages/document.py" = ["C901"]
"src/robotsix_mill/stages/deliver.py" = ["C901"]
"src/robotsix_mill/stages/code_reviewing.py" = ["C901"]
"src/robotsix_mill/forge/github.py" = ["C901"]
"src/robotsix_mill/forge/gitlab.py" = ["C901"]
"src/robotsix_mill/core/service.py" = ["F821", "C901"]
"src/robotsix_mill/pass_runner.py" = ["C901"]
"src/robotsix_mill/agents/coding.py" = ["C901"]
"src/robotsix_mill/agents/bespoke.py" = ["C901"]
"src/robotsix_mill/timeout_escalation_runner.py" = ["C901"]
"src/robotsix_mill/agents/scope_triage.py" = ["C901"]
"src/robotsix_mill/agents/dedup.py" = ["C901"]
"src/robotsix_mill/agents/web_research.py" = ["C901"]
"src/robotsix_mill/trace_review_runner.py" = ["C901"]
"src/robotsix_mill/trace_health_runner.py" = ["C901"]
"src/robotsix_mill/verify_runner.py" = ["C901"]
"src/robotsix_mill/runtime/tracing.py" = ["C901"]
"src/robotsix_mill/stages/merge.py" = ["C901"]
"src/robotsix_mill/stages/pause.py" = ["C901"]
# Migration / one-shot helper scripts — complexity is acceptable
# because they're throwaway scripts, not library code.
"dev/migrate-env-to-yaml.py" = ["C901", "E402"]
"scripts/verify_repos_config.py" = ["C901"]
# Langfuse trace fixtures pre-date the timezone-aware migration;
# converting them to ``datetime.now(timezone.utc)`` triggers a much
# wider refactor of the response-shape fixtures. Allow the legacy
# call here while the rest of the codebase already moved off it.
"tests/langfuse/test_langfuse_client.py" = ["DTZ003"]

[tool.deptry]
known_first_party = ["robotsix_mill"]
# Nested standalone packages each have their own pyproject.toml and validate
# their own dependencies; exclude them so the root scan doesn't flag imports.
extend_exclude = ["robotsix-modules", "robotsix-yaml-config"]

[tool.deptry.per_rule_ignores]
# CLI-only dev/lint/docs tools that are never imported at runtime.
DEP002 = [
    "pytest",
    "pytest-asyncio",
    "pytest-cov",
    "bandit",
    "mypy",
    "ruff",
    "deptry",
    "mkdocs-material",
    "langfuse",
    "robotsix-modules",
]
# Packages imported directly but pulled in transitively through
# pydantic-ai-slim / sqlmodel — the imports are intentional.
DEP003 = ["pydantic", "sqlalchemy", "openai"]

[tool.mypy]
strict = true
python_version = "3.14"
packages = ["src/robotsix_mill"]
ignore_missing_imports = true
