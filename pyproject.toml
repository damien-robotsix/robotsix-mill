[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "robotsix-mill"
version = "0.0.1"
description = "Self-contained LLM-driven ticket solver. SQLite-backed management plane + file workspaces, event-driven worker, delivers merge requests to GitHub/GitLab."
readme = "README.md"
requires-python = ">=3.14"
license = "MIT"
authors = [{ name = "Damien Robotsix" }]
dependencies = [
    "pydantic-ai-slim[openrouter,openai]>=1.0",
    "pydantic-settings>=2",
    "sqlmodel>=0.0.22",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "httpx>=0.27",
    "pyjwt[crypto]>=2",
]

[project.optional-dependencies]
# Tracing is opt-in: nothing here is imported unless LANGFUSE_* is set.
tracing = [
    "langfuse>=3",
    "opentelemetry-sdk",
    "opentelemetry-exporter-otlp-proto-http",
]
dev = ["pytest>=8", "pytest-asyncio>=0.21"]

[project.scripts]
robotsix-mill = "robotsix_mill.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/robotsix_mill"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
