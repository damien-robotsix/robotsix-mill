[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "robotsix-auto-mail"
version = "0.0.0"
requires-python = ">=3.12,<3.15"
dependencies = [
    "pyyaml>=6.0",
    "urllib3>=2.0",
    "pydantic>=2.0",
    "jinja2>=3.1",
]

[project.optional-dependencies]
dev = [
    "ruff",
    "mypy",
    "pytest",
    "deptry",
    "hatchling",
    "types-PyYAML",
    "types-jinja2",
    "types-urllib3",
    "robotsix-llmio[openrouter-deepseek]",
]
llm = [
    "robotsix-llmio[openrouter-deepseek]",
]

[tool.ruff]
target-version = "py312"
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I", "S", "B", "N", "RUF"]

[tool.ruff.lint.per-file-ignores]
"src/robotsix_auto_mail/detect.py" = ["E501"]
"tests/**/*.py" = ["S101", "S105", "S106"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.bandit]
skips = ["B107"]

[project.scripts]
robotsix-auto-mail = "robotsix_auto_mail.cli:main"

[tool.mypy]
strict = true
python_version = "3.12"
packages = ["src/robotsix_auto_mail"]

[tool.deptry]
# Treat everything under [project.optional-dependencies][dev] (ruff, mypy,
# pytest, hatchling, types-PyYAML, robotsix-llmio, deptry) as dev-only.
# Dev deps are exempt from DEP002 (unused) regardless of whether tests/
# actually imports them.
optional_dependencies_dev_groups = ["dev"]

[tool.deptry.per_rule_ignores]
# pydantic_ai is pulled in transitively via robotsix-llmio[openrouter-deepseek]
# (declared in the [llm] extra); the lazy import in detect.py is intentional.
DEP003 = ["pydantic_ai"]

[tool.uv.sources]
robotsix-llmio = { git = "https://github.com/damien-robotsix/robotsix-llmio.git", rev = "main" }
