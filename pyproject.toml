[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "robotsix-mill"
version = "0.0.1"
description = "Self-contained LLM-driven ticket solver. SQLite-backed management plane + file workspaces, event-driven worker, delivers merge requests to GitHub/GitLab."
readme = "README.md"
requires-python = ">=3.14"
license = "MIT"
authors = [{ name = "Damien Robotsix" }]
dependencies = [
    "pydantic-ai-slim[openrouter,openai]>=1.0",
    "pydantic-settings>=2",
    "pyyaml>=6",
    "sqlmodel>=0.0.22",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "httpx>=0.27",
    "pyjwt[crypto]>=2",
]

[project.optional-dependencies]
# Tracing is opt-in: nothing here is imported unless LANGFUSE_* is set.
tracing = [
    "langfuse>=3",
    "opentelemetry-sdk",
    "opentelemetry-exporter-otlp-proto-http",
]
dev = ["pytest>=8", "pytest-asyncio>=0.21", "pytest-cov>=7", "bandit[toml]>=1.8", "mypy>=1.15", "ruff>=0.11"]
docs = ["mkdocs-material>=9"]

[project.scripts]
robotsix-mill = "robotsix_mill.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/robotsix_mill"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.coverage.report]
precision = 2
show_missing = true

[tool.bandit]
# Run with: pre-commit run bandit --all-files
# (uses `-c pyproject.toml` via the pre-commit hook args)
targets = ["src/"]
exclude_dirs = ["tests/"]
skips = ["B101"]

[tool.ruff.lint]
extend-select = ["DTZ001", "DTZ002", "DTZ003", "C90"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.pip-audit]
# PYSEC-2025-183 (pyjwt): "weak encryption" advisory disputed by the
# supplier — the algorithm strength is determined by the *key* the
# caller supplies, not by pyjwt itself.  No fix version is published.
# pyjwt enters our tree only as a transitive dep (langfuse → pyjwt for
# OTel auth signing); mill does not call its signing API directly.
#
# MAL-2026-4750 (fastapi): malicious undeclared dependency "fastar"
# was added to the [standard] extras group of fastapi 0.136.3 on PyPI.
# The mill project depends on "fastapi>=0.115" with NO extras — we
# never install fastapi[standard], so the malicious package is not
# pulled into our dependency tree.  Remove if we ever add a [standard]
# extra or the advisory is fixed upstream.
ignore-vulns = ["PYSEC-2025-183", "MAL-2026-4750"]

[tool.mypy]
strict = true
python_version = "3.14"
packages = ["src/robotsix_mill"]
ignore_missing_imports = true
