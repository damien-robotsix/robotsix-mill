# Alembic configuration for robotsix-mill SQLite databases.
#
# The ``sqlalchemy.url`` here is a placeholder; the actual per-board
# SQLite path is set at runtime by ``db.py`` via
# ``config.set_main_option("sqlalchemy.url", …)`` before each
# ``upgrade()`` / ``stamp()`` call.
#
# ``script_location`` must point at the directory containing
# ``env.py`` and ``versions/``.

[alembic]
script_location = alembic
sqlalchemy.url = sqlite:////tmp/drift-check-2.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

[post_write_hooks]
# No post-write hooks needed — SQLite migration files don't require
# reformatting.
