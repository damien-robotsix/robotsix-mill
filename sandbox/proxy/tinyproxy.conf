Port 8888
Listen 0.0.0.0
Timeout 600

# Allow connections from Docker network ranges.
Allow 127.0.0.1
Allow 172.16.0.0/12
Allow 10.0.0.0/8

# Domain allowlist — ONLY these destinations are permitted.
# Filter directives define a case-insensitive substring allowlist.
# When any Filter is present, only matching requests pass.
Filter "pypi.org"
Filter "files.pythonhosted.org"
Filter "github.com"
Filter "api.github.com"

# Disable upstream proxy (we connect directly).
Upstream none

# Logging
LogLevel Info
LogFile "/dev/stdout"

# Disable stats page
DisableViaHeader Yes
