Port 8888
Listen 0.0.0.0
Timeout 600

# Allow connections from Docker network ranges.
Allow 127.0.0.1
Allow 172.16.0.0/12
Allow 10.0.0.0/8

# Domain allowlist — ONLY these destinations are permitted.
# tinyproxy's Filter directive takes a FILE of patterns (NOT inline
# domains). FilterDefaultDeny Yes makes it an allowlist: only hosts
# matching a pattern in the file pass; FilterExtended On selects POSIX
# extended regex; FilterURLs Off matches the host (not the full URL).
Filter "/etc/tinyproxy/filter"
FilterDefaultDeny Yes
FilterExtended On
FilterURLs Off

# (No Upstream directive: tinyproxy connects directly by default.)

# Logging
LogLevel Info
LogFile "/dev/stdout"

# Disable stats page
DisableViaHeader Yes
