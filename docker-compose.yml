# robotsix-mill: self-contained ticket solver. SQLite management plane +
# per-ticket file workspaces live under ./.data (host-visible bind so you
# can inspect tickets/clones/artifacts directly). The container runs the
# API + event-driven worker; emit a ticket and it is picked up
# immediately. Interact via
# `docker compose exec mill robotsix-mill ticket ...`.
#
# The ticket board + API are published on 127.0.0.1:8077 (localhost
# only — the API is unauthenticated; do not bind it to 0.0.0.0).
#
# SECURITY: command execution ALWAYS runs in a disposable
# `--network none` sibling container (there is no local mode). That
# needs the host Docker socket below — which grants the mill container
# root-equivalent control of the host daemon. Only ./.data is bound in;
# the project source is NOT, so the agent has no path to it. The host
# path of `./.data` is set via `sandbox.data_mount` in
# config/config.yaml (the bind-mount target on the host docker
# daemon's filesystem — needed because the sibling sandbox runs
# outside the mill container).

services:
  mill:
    image: robotsix/mill:latest
    restart: unless-stopped
    # Reap orphaned subprocesses. entrypoint.sh execs `runuser`, which
    # becomes PID 1 but is NOT an init — it never wait()s reparented
    # orphans. The transient `claude` CLI runs `git` via its Bash tool
    # and exits; its git children then reparent to PID 1 and pile up as
    # zombies (observed: 16 defunct `git` under runuser). `init: true`
    # puts Docker's tini at PID 1 (entrypoint runs under it); orphans
    # reparent to tini and get reaped.
    init: true
    # Match Settings.shutdown_grace_seconds (default 1800). The worker
    # waits for in-flight periodic passes (survey, audit, health, …)
    # to finish on SIGTERM; docker's default 10s would SIGKILL before
    # that wait completed and kill an agent mid-run.
    stop_grace_period: 30m
    # Default Docker soft limit is 1024 — easily exhausted when many
    # workers (max_concurrency=10) each spawn git/trivy/agent
    # subprocesses with their own pipes. We've seen this crash workers
    # with "OSError: [Errno 24] Too many open files" and floor the
    # active pool to 0. Raise to 65536.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    # Resource limits prevent a single runaway agent from exhausting host
    # memory/CPU and triggering an OOM kill (which would interrupt every
    # concurrently-running periodic agent).  The mill worker is
    # single-process; 2 CPUs and 4 GiB leave headroom for concurrent
    # agent subprocesses (git, trivy, model CLI) spawned by asyncio tasks.
    mem_limit: 4g
    cpus: 2
    # No group_add: entrypoint.sh inspects /var/run/docker.sock at
    # start-up and joins the matching group automatically (any host
    # docker GID — 959, 999, 1000 — Just Works).
    volumes:
      - ./.data:/data
      # Bind-mount config/ so the single config file (config.yaml, with
      # its secrets: block) is picked up without rebuilding the image.
      # The committed config.example.yaml still exists in the image; the
      # bind shadows it with the host's same files plus
      # any overrides.
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock
      # GitHub App auth: bind the private key into the container at the
      # SAME path it has on the host, so GITHUB_APP_PRIVATE_KEY_PATH (a
      # host path, set in .env) is a valid path inside the container
      # too. Falls back to /dev/null when App auth is not used.
      - ${GITHUB_APP_PRIVATE_KEY_PATH:-/dev/null}:${GITHUB_APP_PRIVATE_KEY_PATH:-/dev/null}:ro
    ports:
      - "127.0.0.1:8077:8077"   # ticket board + API at http://localhost:8077

  sandbox-proxy:
    image: robotsix/mill-sandbox-proxy:latest
    container_name: sandbox-proxy
    restart: unless-stopped
    networks:
      - sandbox-int
      - default

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    command: --label-enable --interval 300 --cleanup
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

networks:
  sandbox-int:
    name: mill-sandbox-net
    internal: true
