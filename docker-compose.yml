# robotsix-mill: self-contained ticket solver. SQLite management plane +
# per-ticket file workspaces, both on the named volume `mill_data`. The
# container runs the API + event-driven worker; emit a ticket and it is
# picked up immediately. Interact via
# `docker compose exec mill robotsix-mill ticket ...`.
#
# Uncomment the ports mapping to reach the API (and a future web
# frontend) from the host.
#
# SECURITY: the command sandbox (MILL_SANDBOX_MODE=docker) runs each
# agent command in a disposable `--network none` sibling container. That
# requires the host Docker socket below. Mounting docker.sock grants the
# mill container root-equivalent control of the host daemon — run this
# on a host you would trust the agent with, or set
# MILL_SANDBOX_MODE=local only where the workload is trusted.
# DOCKER_GID must be the GID that owns /var/run/docker.sock on the host
# (`stat -c %g /var/run/docker.sock`); set it in .env.

services:
  mill:
    build: .
    image: robotsix/mill:latest
    restart: unless-stopped
    env_file:
      - .env
    group_add:
      - "${DOCKER_GID:-999}"   # host docker socket group, so non-root mill can use it
    volumes:
      - mill_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    # ports:
    #   - "8077:8077"

volumes:
  mill_data:
    name: mill_data
