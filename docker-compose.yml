# robotsix-mill: self-contained ticket solver. SQLite management plane +
# per-ticket file workspaces live under ./.data (host-visible bind so you
# can inspect tickets/clones/artifacts directly). The container runs the
# API + event-driven worker; emit a ticket and it is picked up
# immediately. Interact via
# `docker compose exec mill robotsix-mill ticket ...`.
#
# Uncomment the ports mapping to reach the API from the host.
#
# SECURITY: command execution ALWAYS runs in a disposable
# `--network none` sibling container (there is no local mode). That
# needs the host Docker socket below — which grants the mill container
# root-equivalent control of the host daemon. Only ./.data is bound in;
# the project source is NOT, so the agent has no path to it. Run compose
# from the repo root (MILL_SANDBOX_DATA_MOUNT uses $PWD).

services:
  mill:
    build: .
    image: robotsix/mill:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # sibling sandbox containers must bind the host path of ./.data
      # (the docker daemon resolves -v on the host, not in this container)
      - MILL_SANDBOX_DATA_MOUNT=${PWD}/.data
    group_add:
      - "${DOCKER_GID:-999}"   # host docker socket group, so non-root mill can use it
    volumes:
      - ./.data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    # ports:
    #   - "8077:8077"
