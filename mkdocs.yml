site_name: robotsix-mill
theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Agent Communication Research: agents/communication-research.md
  - Configuration & Deployment:
      - Configuration reference: configuration.md
      - Observability: langfuse/observability.md
      - Continuous deployment: dev-tooling/deployment.md
      - Autoupdate: autoupdate/index.md
      - Reusable-workflow callers: dev-tooling/reusable-workflow-callers.md
      - Docker architecture: docker-architecture.md
      - Security model: sandbox/security.md
      - CI policy: dev-tooling/ci-policy.md
      - Config audit: config-audit.md
      - "RFC: config v2": rfc-config-v2.md
  - Deps:
      - Dependency management: deps/dependencies.md
  - Pipeline:
      - Agent catalog: agents/index.md
      - Approval gate: approval-gate.md
      - Dedup guard: core/dedup-guard.md
      - Merge stage: merge-stage.md
      - Epic dedup: epic-dedup.md
      - "AGENT.md candidates": agents/md-candidates.md
      - Scope triage: scope-triage.md
  - Agents & Internals:
      - Audit agent: agents/audit-agent.md
      - Blocked ticket recovery: blocked-ticket-recovery.md
      - Retrospect memory: retrospect-memory.md
      - Trace-health check: langfuse/trace-health.md
      - Langfuse observability: langfuse/observability.md
      - Diagnostic agent: agents/diagnostic-agent.md
      - Expert YAML schema: agent-definitions/expert-yaml-schema.md
      - Agent YAML schema: agents/agent-yaml-schema.md
      - Meta board: meta/meta-board.md
  - Runtime:
      - Worker: runtime/worker.md
      - API routes: runtime/routes.md
      - Board: runtime/board.md
      - Tracing: runtime/tracing.md
      - Run registry: runtime/run-registry.md
  - Operations:
      - Cost controls & resilience: cost-and-resilience.md
      - Notifications: notify/notifications.md
      - Ticket provenance: core/ticket-provenance.md
      - VCS (git) module: vcs/README.md
      - Workspace cleanup: core/workspace-cleanup.md
      - Orphaned-PR check: runners/orphaned-pr-check.md
      - Pin bump: runners/pin-bump.md
      - Attaching screenshots: core/screenshots.md
  - Design:
      - Cost indicators: design/cost-indicators.md
      - Worker Process Split (ADR): design/worker-process-split.md
  - Forge:
      - Overview: forge/architecture.md
      - GitHub App setup: forge/github-app.md
      - Authentication: forge/auth.md
      - GitLab backend: forge/gitlab.md
      - CI monitoring: forge/ci-monitoring.md
      - Code scanning: forge/code-scanning.md
  - CLI:
      - Usage: cli/usage.md
  - Guides:
      - Adding a New Agent: guides/adding-a-new-agent.md
  - API Reference:
      - Agents: agents/reference.md
      - Core: reference/core.md
      - Runtime: runtime/reference.md
      - Stages: reference/stages.md

plugins:
  - mkdocstrings:
      handlers:
        python:
          options:
            show_root_heading: true
            separate_signature: true
            members_order: source
            signature_crossrefs: true
            filters: ["!^_"]
            show_source: false

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
