site_name: robotsix-mill
theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Configuration & Deployment:
      - Configuration reference: configuration.md
      - Continuous deployment: deployment.md
      - Docker architecture: docker-architecture.md
      - GitHub App / PAT: github-app.md
      - Security model: security.md
  - Pipeline:
      - Agent catalog: agents.md
      - Approval gate: approval-gate.md
      - Dedup guard: dedup-guard.md
      - Merge stage: merge-stage.md
  - Agents & Internals:
      - Audit agent: audit-agent.md
      - Blocked ticket recovery: blocked-ticket-recovery.md
      - Retrospect memory: retrospect-memory.md
      - Trace-health check: trace-health.md
      - Expert YAML schema: expert-yaml-schema.md
  - Operations:
      - Cost controls & resilience: cost-and-resilience.md
      - Notifications: notifications.md
      - Ticket provenance: ticket-provenance.md
      - Workspace cleanup: workspace-cleanup.md
  - API Reference:
      - Agents: reference/agents.md
      - Core: reference/core.md
      - Runtime: reference/runtime.md
      - Stages: reference/stages.md

plugins:
  - mkdocstrings:
      handlers:
        python:
          options:
            show_root_heading: true
            separate_signature: true
            members_order: source
            signature_crossrefs: true
            filters: ["!^_"]
            show_source: false

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
