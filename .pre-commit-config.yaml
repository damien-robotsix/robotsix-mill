repos:
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.4.1
    hooks:
      - id: commitizen
        stages: [commit-msg]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: f40886d54c729f533f864ed6ce584e920feb0af7  # frozen: v1.15.0
    hooks:
      - id: mypy
        args: [--strict, --ignore-missing-imports]
        additional_dependencies:
          - pydantic-ai-slim
          - sqlmodel
          - fastapi
  - repo: https://github.com/PyCQA/bandit
    rev: 8ff25e07e487f143571cc305e56dd0253c60bc7b  # frozen: 1.8.3
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, -r, src/]
        additional_dependencies:
          - bandit[toml]
  - repo: https://github.com/hadolint/hadolint
    rev: 57e1618d78fd469a92c1e584e8c9313024656623  # frozen: v2.14.0
    hooks:
      - id: hadolint-docker
        args: [--failure-threshold, warning]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: cef0300fd0fc4d2a87a85fa2093c6b283ea36f4b  # frozen: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: [--maxkb=500]
  - repo: https://github.com/Yelp/detect-secrets
    rev: 01886c8a910c64595c47f186ca1ffc0b77fa5458  # frozen: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: 9257c6050c0261b8c57e712f632dc4a8010109a9  # frozen: v1.25.2
    hooks:
      - id: zizmor
        args: [--offline]
  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca  # frozen: v1.7.12
    hooks:
      - id: actionlint
  - repo: https://github.com/lycheeverse/lychee
    rev: v0.18.1
    hooks:
      - id: lychee
        args: ["--config", "lychee.toml", "--no-progress"]
        files: ^docs/.*\.md$
        types: [markdown]
  - repo: local
    hooks:
      - id: validate-module-taxonomy
        name: Validate module taxonomy
        entry: robotsix-modules-validate
        language: system
        files: ^docs/modules\.ya?ml$
        types_or: [yaml]
  - repo: local
    hooks:
      - id: validate-module-paths
        name: Validate module paths exist on disk
        entry: python scripts/validate_module_paths.py
        language: python
        additional_dependencies: ["pyyaml>=6"]
        files: ^docs/modules\.ya?ml$
        pass_filenames: false
  - repo: local
    hooks:
      - id: validate-config-sync
        name: Validate config surface is in sync
        entry: python scripts/check_config_sync.py
        language: system
        files: ^(config/mill\.defaults\.yaml|config/secrets\.example\.yaml|src/robotsix_mill/config\.py|src/robotsix_mill/config_loader\.py)$
        pass_filenames: false
  - repo: local
    hooks:
      - id: validate-workflow-permissions
        name: Validate workflow security-events permission
        entry: python scripts/validate_workflow_permissions.py
        language: python
        additional_dependencies: ["pyyaml>=6"]
        files: ^\.github/workflows/.*\.ya?ml$
        pass_filenames: false
  - repo: local
    hooks:
      - id: vulture
        name: Vulture (dead code)
        entry: vulture --ignore-decorators "@field_validator,@model_validator" src/ vulture_whitelist.py
        language: system
        types: [python]
        pass_filenames: false
  - repo: local
    hooks:
      - id: uv-lock-check
        name: uv lock --check
        entry: uv lock --check
        language: system
        pass_filenames: false
        always_run: true
  - repo: local
    hooks:
      - id: check-kind-literals
        name: Reject bare string TicketKind literals in tests
        entry: python scripts/check_kind_literals.py
        language: python
        files: ^tests/.*\.py$
        pass_filenames: false
  - repo: local
    hooks:
      - id: check-registration
        name: Check module file registration
        entry: robotsix-modules check-registration docs/modules.yaml --root .
        language: system
        always_run: true
