# Local YAML overrides — TEMPLATE.
#
# Copy to config/mill.local.yaml (gitignored), then edit for your host:
#   cp config/mill.local.example.yaml config/mill.local.yaml
#
# This is the canonical home for HOST-OPERATOR preferences that should
# NOT be baked into the image: bind-mount paths, the API listen
# address, model overrides for cost/perf experiments, and so on.
# Anything operator-facing that used to live as a MILL_* env var in
# docker-compose.yml moved here when the alias surface was retired in
# 9cd2630. Secrets stay in config/secrets.yaml (separate file, separate
# model).
#
# Layered ON TOP of config/mill.defaults.yaml; values here win over
# the defaults. Only override the fields you actually need to change —
# the entries below are illustrative.

service:
  # uvicorn listen address. The container's docker-compose maps
  # 127.0.0.1:8077 → container's 8077 via docker-proxy, which talks to
  # the container's bridge IP and NOT its loopback, so uvicorn inside
  # the container must bind to 0.0.0.0 for the board to be reachable
  # from the host. The defaults' 127.0.0.1 is correct for a bare-host
  # run; the container needs this override.
  api_host: "0.0.0.0"

  # Mill's data directory inside the container. The Settings default
  # is the relative path ".data" which inside the container resolves
  # to /app/.data — a non-mounted path that gets baked from the build
  # context. The container's bind-mount lives at /data; pin it here
  # so writes go to the host's ./.data and survive rebuilds.
  data_dir: /data

sandbox:
  # HOST path of ./.data. The sandbox is a sibling container the
  # mill spawns via the docker socket; the host docker daemon resolves
  # bind-mounts on its own filesystem, not the mill container's, so
  # the sandbox can't see /data — it needs the host's view of what
  # /data is. Pre-9cd2630 docker-compose set this via
  # MILL_SANDBOX_DATA_MOUNT=${PWD}/.data; the alias is gone, so the
  # absolute host path moves here. Replace with YOUR absolute path.
  data_mount: /ABSOLUTE/PATH/TO/robotsix-mill/.data

  # Override the sandbox image. The default (robotsix/mill-sandbox:latest)
  # is a minimal Python + uv image with no mill source. For full toolchain
  # access (git, pytest, mill source), use robotsix/mill:dev.
  # image: robotsix/mill:dev

  # Override the proxy URL. Set to empty string to disable the proxy and
  # restore --network none (all network access blocked).
  # proxy_url: ""

