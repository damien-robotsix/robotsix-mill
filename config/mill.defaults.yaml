# =============================================================================
#  Canonical defaults for every configurable knob in robotsix-mill.
#
#  This is the SINGLE SOURCE OF TRUTH for "what is configurable" and what
#  the safe default value is.  It is committed to the repo; local overrides
#  go in config/mill.local.yaml (gitignored); production overrides go in
#  config/mill.production.yaml (host-mounted, gitignored).  Secrets live in
#  config/secrets.yaml (separate file, separate model).
#
#  Field count: 133 unique values across 17 logical groups.
#  See docs/rfc-config-v2.md for architecture rationale.
# =============================================================================

# ---------------------------------------------------------------------------
#  core — models, limits, memory, and other engine-tuning knobs
# ---------------------------------------------------------------------------

core:

  # Per-agent model selection is declared in each agent definition's
  # ``level: 1|2|3`` field (resolved to a (transport, model) by build_agent
  # via llmio tier defaults: L1 DeepSeek flash, L2 DeepSeek pro, L3 Claude
  # Opus). There is no per-agent model config and no backend toggle.

  # -- web-knowledge gateway sub-agent tuning ------------------------------
  web_knowledge_stale_days: 30          # days a cached .md file is considered fresh
  web_knowledge_request_limit: 8        # max tool requests per web-knowledge consultation
  web_knowledge_model: "deepseek/deepseek-v4-flash"  # override model for web-knowledge sub-agent

  # -- request caps, concurrency, retry, and timeouts (20 fields) -----------
  limits:
    coordinator_requests: 500          # per-pass request budget for implement (coordinator); default 500, bounded 1–5000
    coordinator_max_tool_calls: 300       # hard cap on total tool calls per coordinator trace (runaway-loop backstop)
    subtask_request_limit: 30          # per-subtask request cap for spawn_subtask sub-agents
    test_requests: 30                  # per-call cap for test-distillation sub-agent
    consult_requests: 15               # per-call cap for domain-expert consultation sub-agent
    explore_requests: 100              # per-call cap for explore sub-agent
    explore_max_tokens: 4096              # output token cap for explore sub-agent responses
    parallel_explore_max: 4               # max concurrent scouts per parallel_explore fan-out
    max_refine_explore_calls: 4            # hard cap on explore/parallel_explore sub-agent calls per refine run (0 disables)
    max_refine_read_file_calls: 10         # hard cap on read_file calls per refine/triage agent run (0 disables)
    refine_requests: 80                # per-call request cap for the refine agent
    refine_requests_simple: 40            # per-call request cap for simple/sonnet refine runs (lower because explore tools are gated off)
    refine_max_tool_calls: 120         # hard cap on total tool calls per refine trace (runaway-loop backstop)
    refine_max_errors: 20              # max tool-call errors before aborting a refine trace
    refine_web_fetch_max_calls: 5      # per-refine-run cap on web_fetch calls (across all ask_web_knowledge consults)
    refine_web_fetch_max_total_bytes: 500000  # per-refine-run cap on fetch bytes (0 disables)
    refine_web_search_max_calls: 5     # per-refine-run cap on web_search invocations
    maintenance_requests: 100          # per-call request cap for the maintenance agent
    audit_requests: 80                 # per-call request cap for the periodic audit agent
    dedup_requests: 6                  # per-call cap for dedup check
    dedup_max_candidates: 8               # max candidates passed to dedup LLM (similarity pre-filter cap)
    dedup_skip_on_no_overlap: true        # skip dedup LLM call when draft shares no token overlap with any candidate
    dedup_candidate_body_max_chars: 4000  # cap each candidate body fed to dedup prompt (≤0 disables truncation)
    obsolescence_requests: 6              # per-call cap for obsolescence gate
    web_research_requests: 8           # per-call cap for web-research sub-agent
    scope_triage_requests: 8           # per-call cap for scope-triage agent
    scope_triage_max_files: 50   # max out-of-scope text files before flood guard blocks (0 disables)
    triage_requests: 8                # per-call cap for pre-refine triage agent
    already_done_requests: 8            # per-call cap for already-done verifier sub-agent
    doc_requests: 16                  # per-run request cap for the document agent
    doc_classifier_requests: 3         # per-call cap for doc-classifier gate
    doc_classifier_diff_max_chars: 6000  # cap diff fed to doc-classifier gate (truncation safe: conservative user_facing bias)
    review_requests: 80                # per-call cap for review agent (counts tool calls + reasoning steps; 80 covers a 4-6 file PR)
    max_fix_iterations: 8              # implement→test fix loop iterations before BLOCK
    max_stuck_cycles: 3                # re-entries to same stage without progress before BLOCK
    poll_backoff_enabled: true           # adaptive poll backoff for unchanged/blocked tickets (reduces wasted LLM calls)
    poll_backoff_base_seconds: 300       # fast-poll cadence — first backoff step after one unchanged cycle (5 min)
    poll_backoff_max_seconds: 1800       # max poll backoff (30 min cap)
    poll_backoff_factor: 2.0             # exponential factor per consecutive unchanged cycle
    max_spend_usd_per_ticket: 20.0     # dollar cap per ticket — universal runaway-loop backstop (0.0 = disabled)
    max_traces_per_ticket: 15          # trace-count circuit-breaker (0 = disabled)
    max_openrouter_marginal_usd_per_ticket: 3.0  # OpenRouter marginal-spend breaker (0.0 = disabled)
    stage_timeout_seconds: 2400        # per-stage wall-clock timeout before BLOCK (0 = disabled)
    stage_timeout_overrides: {refine: 900}  # per-stage timeout overrides; refine caps at 900s (15 min), operators can override/disable (0) via MILL_STAGE_TIMEOUT_OVERRIDES / core.limits.stage_timeout_overrides
    transient_retries: 4               # max retries for transient network/model failures
    transient_backoff_base: 2.0        # base seconds for exponential backoff (jittered)
    transient_backoff_cap: 30.0        # max seconds between transient retries
    rate_limit_backoff_base: 30.0      # base seconds for rate-limit backoff (longer window)
    rate_limit_backoff_cap: 120.0      # max seconds between rate-limit retries
    stage_retry_max_attempts: 5        # max re-attempts for stage-level transient failures
    stage_retry_base_delay: 2.0        # base seconds for stage-retry exponential backoff
    stage_retry_max_delay: 60.0        # max seconds between stage-retry attempts
    network_probe_host: "github.com"   # probe host for global-outage detection
    network_outage_retry_seconds: 120  # re-poll interval when probe fails
    max_global_concurrency: 12         # host-level cap on total concurrently-running stages across all boards (on top of per-board max_concurrency)

  # -- memory ledgers, reference files, and dedup lookback (7 fields) ------
  memory:
    max_memory_chars: 8000               # max chars loaded from any memory ledger per pass
    retrospect_log_max_chars: 12000      # max chars of retrospect history/comments logs (0 disables)
    retrospect_candidates_max_entries: 100   # max entries kept in AGENT_CANDIDATES.md; pending always kept, resolved pruned oldest-first (0 disables)
    reference_files_max_count: 5         # max files whose full content refine stores
    reference_files_max_total_lines: 3000  # max total lines across selected reference files
    dedup_lookback_days: 7               # days back closed tickets are dup candidates

  # -- direct core.* engine toggles (defaults mirror the Settings fields) ---
  claude_sdk_vision_enabled: false      # allow image input on Claude-SDK-routed agents
  claude_max_concurrency: 4            # max concurrent Claude SDK calls (semaphore cap)
  low_credit_threshold_usd: 5.0         # OpenRouter balance below this → board warning banner
  low_credit_poll_enabled: true         # enable proactive GET /api/v1/credits hourly poll
  low_credit_poll_interval_seconds: 3600  # seconds between credit-balance checks
  requeue_batch_size: 5                 # tickets enqueued per batch in the startup re-queue drip feed
  requeue_batch_pause_seconds: 2.0      # pause (seconds) between batches in the startup re-queue drip feed
  startup_jitter_seconds: 30            # max random spread (seconds) added to the per-repo periodic pass first-tick delay
  board_list_cache_ttl_seconds: 3.0     # short-TTL cache for board-poll GET /tickets (0.0 disables); collapses repeated polls so they don't stall the API
  enable_repo_creation: false           # allow the new-repo meta flow to create repositories
  repo_visibility_default: public      # "public" | "private" — default visibility for new repos
  lint_on_edit: true                    # run ruff after each agent file edit
  read_file_max_chars: 50000            # cap on implicit full read_file payload (0 disables); ranged reads never truncated
  language_instructions_dir: agent_definitions/language_instructions  # directory of per-language instruction snippets injected into implement agent prompt
  meta_periodic: false                  # enable the cross-repo meta-agent pass
  meta_interval_seconds: 86400          # seconds between meta-agent passes

# -- epic dedup lookback (top-level, mirrors core.memory.dedup_lookback_days) --
epic_dedup_lookback_days: 7             # days back closed tickets are dup candidates for epic child dedup

# ---------------------------------------------------------------------------
#  forge — delivery platform configuration
# ---------------------------------------------------------------------------

forge:
  kind: none                              # github | gitlab | auto | none
  remote_url: null                        # remote URL for clone + push
  target_branch: main                     # target branch for PRs
  auth_mode: token                        # token (PAT) | app (GitHub App)
  github_app_private_key_path: null       # host path to App private-key .pem (not a secret)
  github_api_url: https://api.github.com  # override for GitHub Enterprise
  gitlab_api_url: https://gitlab.com/api/v4  # override for self-hosted GitLab

# ---------------------------------------------------------------------------
#  sandbox — disposable container execution environment
# ---------------------------------------------------------------------------

sandbox:
  image: robotsix/mill-sandbox:latest  # Docker image for sandbox containers (includes uv binary)
  network: mill-sandbox-net            # Docker network (internal, filtered through proxy)
  proxy_url: http://sandbox-proxy:8888 # egress proxy URL (empty = no proxy, --network none)
  memory: 2g                           # memory limit
  pids_limit: 512                      # PID limit
  readonly: true                       # mount rootfs read-only (except tmpfs /tmp)
  data_volume: mill_data               # named Docker volume for data (fallback)
  data_mount: null                     # host path for bind-mounted data (overrides data_volume)
  command_timeout: 1800                # wall-clock cap (seconds) for shell/test commands
  test_command: ""                     # global fallback. Precedence: per-repo .robotsix-mill/config.yaml test_command (highest) > repos.yaml.test_command > this. Empty everywhere = PASS short-circuit.
  smoke_command: ""                    # global fallback for the path-scoped smoke gate (runs after unit tests pass). Precedence: per-repo .robotsix-mill/config.yaml smoke_command (highest) > this global fallback > empty everywhere = no smoke gate (short-circuits to PASS).
  skills_dir: skills                   # directory of skill docs injected into system prompts

# ---------------------------------------------------------------------------
#  web — web search (sub-agent) and fetch (isolated container)
# ---------------------------------------------------------------------------

web:
  search_enabled: true                        # enable web-search capability
  research_request_limit: 8                   # per-call request cap for web research
  fetch_image: curlimages/curl:8.17.0         # Docker image for isolated web_fetch container
  fetch_max_bytes: 2000000                    # max bytes fetched per URL (network-level cap)
  fetch_max_text_bytes: 40000                 # max bytes returned to the agent AFTER HTML→text extraction (~10K tokens)
  fetch_timeout: 30                           # timeout (seconds) per web fetch
  fetch_raw: false                            # when true, skip HTML→text + per-run URL dedupe (operator opt-in)
  fetch_max_calls: 15                         # max web_fetch calls per web-knowledge consult (cache hits free)
  fetch_max_total_bytes: 2000000              # cumulative cap on returned text bytes per consult

# ---------------------------------------------------------------------------
#  gates — human approval, auto-approve, code review, triage, auto-merge
# ---------------------------------------------------------------------------

gates:
  require_approval: true                   # pause after refine for human approval
  auto_approve_enabled: false              # conservative auto-approve triage
  review_enabled: false                    # enable dual-model code review before deliver
  review_max_rounds: 3                     # max CODE_REVIEW round-trips before escalate
  auto_merge_enabled: false                # auto-merge green PR via forge API (opt-in)
  comments_after_body: false               # board drawer renders description.md after comments with a Hide toggle (opt-in)
  review_feedback_enabled: false           # enable autonomous review-revision (opt-in — implements changes requested by human reviewers)
  pr_summary_enabled: false               # generate structured PR body from diff via cheap LLM (opt-in)
  refine_triage_enabled: true              # cheap triage before full refine (skip if precise)
  max_re_refine_cycles_before_cheap: 2     # force cheap model after this many "changes requested" send-backs; 0 = never
  refine_trivial_routing_enabled: true     # route trivial-scope tickets to cheap model instead of Opus
  refine_trivial_model_level: 3            # model level for trivial-scope refines (3=flat-cost Claude subscription; 1/2=DeepSeek rollback)
  refine_trivial_subscription_model: sonnet  # Claude alias for trivial/forced-cheap refines routed to the level-3 subscription
  refine_subscription_tier_routing_enabled: true  # complexity-gated Claude alias routing for level-3 refines (False = Opus-always rollback)
  refine_subscription_model_default: sonnet  # Claude alias for simple level-3 refines (non-escalated)
  refine_subscription_model_complex: opus    # Claude alias for needs-exploration level-3 refines (escalated)
  refine_findings_downgrade_enabled: true    # downgrade Opus→cheaper when triage findings are substantial (root cause known)
  refine_findings_downgrade_min_chars: 200   # minimum stripped-char length of findings for the downgrade to fire
  refine_subscription_model_findings: sonnet # Claude alias used when the findings-present downgrade fires
  reviewer_agreement_gate_enabled: true     # pre-Opus guard: skip refine when reviewer agrees with draft's no-change conclusion
  maintenance_triage_enabled: true         # cheap triage before a full maintenance pass
  refine_advisory_dedup_enabled: true      # cheap advisory-dedup-verification gate after inflight-advisory phase (resolves carried ``Possible duplicate of <id>`` with a single cheapest-tier call)
  spec_review_enabled: true                # post-refinement spec narrative stripping
  scope_triage_enabled: true               # cheap scope-violation triage (EXPAND/REJECT/ESCALATE)
  obsolescence_gate_enabled: false        # pre-refine obsolescence re-validation (opt-in)
  freshness_gate_enabled: false          # deterministic pre-refine gate: stale ticket evidence (opt-in)
  prerequisite_gate_enabled: true        # verify external symbol/import prerequisites in spec before refine
  refine_mill_misroute_gate_enabled: true  # deterministic pre-refine gate: misroute to mill board when source paths absent from checkout
  auto_merge_main_debt_detection_enabled: true  # detect pre-existing main-branch CI debt before auto-merge

# ---------------------------------------------------------------------------
#  stages — per-stage tuning
# ---------------------------------------------------------------------------

stages:
  review:
    prior_context_max_chars: 8000          # max chars of re-review prior-context (comments + rebuttal); 0 = no cap
    diff_max_chars: 200000                 # max chars of combined git diff injected into review prompt; 0 = unbounded
    output_token_budget: 65536            # output token budget for review agent retry on max_tokens exhaustion; 0 = disabled

# ---------------------------------------------------------------------------
#  ci — CI retry ceiling for flake-storm prevention
# ---------------------------------------------------------------------------

ci:
  codeql_fp_triage_enabled: true  # auto-dismiss CodeQL FPs when CodeQL is the sole red check (set false to disable)

# ---------------------------------------------------------------------------
#  pipeline — merge, rebase, ci-fix, retrospect, prune, archive, memory paths
# ---------------------------------------------------------------------------

pipeline:
  branch_prefix: mill/                               # prefix for deliver-stage branch names
  merge_poll_seconds: 120                            # poll interval for PR merge/CI status
  rebase_max_attempts: 3                             # max rebase LLM invocations before BLOCK
  ci_fix_max_iterations: 5                           # single-repo ci-fix: max wait_for_ci push-and-recheck iterations before BLOCK
  ci_fix_request_limit: 120                          # LLM request budget for a single ci-fix sandbox agent
  ci_fix_max_attempts: 2                             # multi-repo merge ci-fix only: max CI-fix LLM invocations before BLOCK
  ci_fix_max_cycles: 3                             # multi-repo merge ci-fix only: hard ceiling on total ci-fix cycles per repo
  ci_fix_max_identical_failures: 2                 # max consecutive identical CI failures before escalating to BLOCKED
  ci_fix_wait_poll_interval_s: 30.0             # seconds between CI-status polls inside wait_for_ci
  ci_fix_wait_timeout_s: 1500.0                # max seconds a single wait_for_ci call blocks before returning pending
  auto_fix_max_cycles: 6                           # cross-stage ceiling on REBASING + FIXING_CI dispatches before BLOCK
  ping_pong_max_alternations: 3                    # max rebase↔ci_fix alternations before BLOCK
  review_revision_max_attempts: 2                    # max review-revision LLM invocations before BLOCK
  retrospect_spawn_drafts: true                      # allow retrospect to file improvement drafts
  retrospect_spawn_agented_proposals: true           # allow retrospect to propose AGENT.md additions
  prune_clone_on_close: true                         # delete workspace repo/ clone on ticket close
  max_archived_tickets: 40                           # max terminal-state tickets retained per board (0 = no purge); closed tickets aren't loaded by the board (include_closed defaults false), so this is kept small to bound DB size while leaving headroom for advisory dedup's 7-day lookback
  max_comments_per_ticket: 500                       # max Comment rows per non-terminal ticket (0 = no cap)
  trace_review_target_repo_id: ""                    # route all trace-review drafts to this board (empty = source-repo routing)
  ci_patterns_path: null                             # override path to the CI failure-patterns file (null = derive from data_dir)
  delete_branch_on_merge: true                      # delete per-ticket head branch on the forge after merge to DONE

  # per-agent memory ledger path overrides (null = derive from data_dir)
  retrospect_memory_path: null            # defaults to <data_dir>/retrospect_memory.md
  trace_inspector_memory_path: null       # defaults to <data_dir>/trace_inspector_memory.md
  implement_memory_path: null             # defaults to <data_dir>/implement_memory.md
  refine_memory_path: null                # defaults to <data_dir>/refine_memory.md
  doc_memory_path: null                   # defaults to <data_dir>/doc_memory.md
  ci_fix_memory_path: null                # defaults to <data_dir>/ci_fix_memory.md
  rebase_memory_path: null                # defaults to <data_dir>/rebase_memory.md
  review_revision_memory_path: null       # defaults to <data_dir>/review_revision_memory.md

# ---------------------------------------------------------------------------
#  periodic — background agents that run on a schedule
# ---------------------------------------------------------------------------

periodic:

  # -- bespoke-agent supervisor reconciliation interval ------------------
  # Master toggle for the per-repo bespoke periodic agent supervisor.
  bespoke_periodic: true
  # How often (seconds) the bespoke supervisor refreshes its clone
  # and reconciles which YAMLs are scheduled.
  bespoke_discovery_interval_seconds: 600

  # -- diagnostic agent — daily deterministic check orchestrator -----------
  diagnostic:
    enabled: false        # skeleton ships disabled; later tickets add checks then enable
    interval_seconds: 86400
    target_repo_id: robotsix-mill
    monitored_repo_ids: []  # empty → falls back to target_repo_id (single repo)

  # -- audit agent — meta-audit for quality/security coverage gaps ---------
  audit:
    enabled: true                   # enable periodic audit passes
    interval_seconds: 86400         # seconds between passes (86400 = 1 day)
    memory_path: null               # defaults to <data_dir>/audit_memory.md

  # -- trace-health — monitors Langfuse for unsessioned traces -------------
  trace_health:
    enabled: true                   # enable periodic trace-health checks
    interval_seconds: 86400         # seconds between checks (min 3600 enforced in worker)

  # -- trace-review — scans Langfuse traces, flags outliers, files drafts ---
  trace_review:
    enabled: true                   # enable periodic trace-review passes
    interval_seconds: 86400         # seconds between passes (min 3600 enforced in worker)
    cost_multiplier: 3.0            # outlier threshold multiplier for cost (cost > median * N → flagged)
    obs_multiplier: 3.0             # outlier threshold multiplier for observation count (obs > median * N → flagged)
    max_repeated_tool: 50           # absolute cap on repeated tool calls before flagging
    per_obs_cost_threshold: 0.001   # minimum per-observation cost to consider a trace for review
    max_drafts_per_run: 5           # cap on drafted findings per pass (prevents board flooding)
    max_traces_per_run: 300         # cap on traces detail-loaded per pass; watermark advances incrementally so a backlog drains with bounded memory (0 disables)
    max_tool_calls: 100             # hard cap on tool calls per trace inspector invocation
    max_errors: 20                  # hard cap on tool-call errors before auto-terminating the trace inspector
    model_level: 1                  # model tier for the trace inspector (1=DeepSeek flash, 2=DeepSeek pro, 3=Claude Opus)
    tool_request_limit: 15          # request budget for the interactive langfuse_inspect_trace tool path
    max_inspections_per_run: 5      # hard cap on LLM inspector calls per trace-review run (0 disables)
    initial_lookback_hours: 24      # first-run lookback window (hours) when no watermark exists
    restart_correlation_window_seconds: 60  # window for correlating incomplete trace with process restart
    dedup_lookback_days: 7          # recency window (days) for pre-filing duplicate check
    inspector_min_requests: 20         # floor for tools-on request budget (even tiny traces get enough)
    inspector_max_requests: 80         # ceiling for tools-on request budget
    inspector_requests_per_obs: 0.1    # requests granted per observation (before min/max clamp)
    inspector_max_obs_for_tools: 200   # traces with more obs use cheap tool-less summary path
    inspector_toolless_requests: 3     # request budget for tool-less summary-only path

  # -- stale-branch-cleanup — deletes old mill branches with no open PR -----
  stale_branch_cleanup:
    enabled: false                  # enable periodic stale-branch cleanup (destructive: opt-in)
    interval_seconds: 86400         # seconds between passes (min 3600 enforced in worker)
    max_age_days: 30                # branch must be older than this to be eligible
    prefix_only: true               # when true, only delete branches starting with branch_prefix

  # -- sandbox-reaper — force-removes leaked sandbox containers ------------
  sandbox_reaper:
    enabled: true                   # reap mill-sbx-*/mill-fetch-* containers orphaned by a crash/restart
    interval_seconds: 3600          # seconds between passes (min 300 enforced in worker); age threshold = 2× sandbox.command_timeout

  # -- health agent — codebase-health across 6 dimensions ------------------
  health:
    enabled: true                   # enable periodic health passes
    interval_seconds: 86400         # seconds between passes
    memory_path: null               # defaults to <data_dir>/health_memory.md

  # -- run-health agent — meta-checker that watches all other periodic agents
  run_health:
    enabled: true                   # enable periodic run-health passes
    interval_seconds: 86400         # seconds between passes
    window_hours: 168               # look-back window (hours) for run-registry scans
    target_repo_id: robotsix-mill   # board for run-health draft tickets
    memory_path: null               # defaults to <data_dir>/<board>/run_health_memory.md

  # -- test-gap agent — identifies modules with zero dedicated tests -------
  test_gap:
    enabled: true                   # enable periodic test-gap passes
    interval_seconds: 86400         # seconds between passes
    memory_path: null               # defaults to <data_dir>/test_gap_memory.md
    request_limit: 80               # max model requests per test-gap pass
    max_tool_calls: 100             # max tool calls per test-gap pass
    max_errors: 20                  # max errors before aborting the pass

  # -- agent-check — audits agent definitions for coherence ----------------
  agent_check:
    enabled: true                   # enable periodic agent-check passes
    interval_seconds: 86400         # seconds between checks (min 60 enforced in worker)
    memory_path: null               # defaults to <data_dir>/agent_check_memory.md

  # -- bc-check — detects backward-compat shims/dead code ripe for removal -
  bc_check:
    enabled: true                   # enable periodic bc-check passes
    interval_seconds: 86400         # seconds between checks (min 60 enforced in worker)
    memory_path: null               # defaults to <data_dir>/bc_check_memory.md

  # -- completeness-check — detects half-wired features --------------
  completeness_check:
    enabled: true                   # enable periodic completeness-check passes
    interval_seconds: 86400         # seconds between checks (min 60 enforced in worker)
    memory_path: null               # defaults to <data_dir>/completeness_check_memory.md
    request_limit: 80               # per-call request cap

  # -- copy-paste agent — deterministic clone detection and triage --------
  copy_paste:
    enabled: true                   # enable periodic copy-paste passes
    interval_seconds: 604800        # seconds between passes (604800 = 1 week)
    memory_path: null               # defaults to <data_dir>/copy_paste_memory.md

  # -- forge-parity agent — forge adapter drift detection -----------------
  forge_parity:
    enabled: true                   # enable periodic forge-parity passes
    interval_seconds: 604800        # seconds between passes (604800 = 1 week)
    memory_path: null               # defaults to <data_dir>/forge_parity_memory.md

  # -- data-dir audit — scans data_dir for oversized files, growth deltas,
  #    and prunes terminal-ticket clone directories ------------------------
  data_dir_audit:
    enabled: true                   # enable periodic data-dir audit passes
    interval_seconds: 86400         # seconds between passes
    memory_path: null               # defaults to <data_dir>/data_dir_audit_memory.md
    size_threshold_bytes: 104857600  # 100 MiB — threshold for oversized files/dirs
    growth_delta_bytes: 10485760    # 10 MiB — growth since last pass
    growth_delta_pct: 20            # 20% — growth percentage threshold
    growth_delta_pct_min_bytes: 1048576   # 1 MiB
    max_drafts_per_pass: 5          # max findings drafted per pass
    prune_closed: false             # opt-in: prune terminal-ticket workspace dirs
    prune_closed_age_seconds: 604800  # 7 days — min age for prune_closed
    prune_terminal_clones: true     # prune repo/ clones in terminal workspaces
    prune_terminal_clones_age_seconds: 86400  # 1 day — min age for clone pruning
    prune_db_rows: true             # GC oldest terminal-ticket DB rows
    prune_memory_ledgers: true      # truncate over-cap *_memory.md files on disk
    prune_orphans: true             # opt-in: prune orphan workspace dirs
    prune_orphans_age_seconds: 86400  # 1 day — min age for orphan pruning

  # -- dependabot-ingest — files tickets from GitHub Dependabot alerts --------
  dependabot_ingest:
    enabled: true                   # enable periodic Dependabot alert ingest
    interval_seconds: 86400         # seconds between passes (min 60 enforced in worker)
    max_drafts_per_pass: 5          # max Dependabot drafts created per pass

  # -- config-sync — detects config ↔ .env ↔ docs drift -----------------------
  config_sync:
    enabled: true                 # enable periodic config-sync passes
    interval_seconds: 86400       # seconds between passes (min 60 enforced in worker)
    memory_path: null             # defaults to <data_dir>/config_sync_memory.md

  # -- state-sync — cross-surface State enum consistency validation ---------
  state_sync:
    model: "deepseek/deepseek-v4-flash"  # state-sync agent model (read-only file scan)
    enabled: true                 # enable periodic state-sync passes
    interval_seconds: 86400       # seconds between passes (min 60 enforced in worker)
    memory_path: null             # defaults to <data_dir>/state_sync_memory.md

  # -- env-doc-sync — env-var documentation consistency validation --------
  env_doc_sync:
    model: "deepseek/deepseek-v4-flash"  # env-doc-sync agent model (read-only file scan)
    enabled: true                 # enable periodic env-doc-sync passes
    interval_seconds: 86400       # seconds between passes (min 60 enforced in worker)
    memory_path: null             # defaults to <data_dir>/env_doc_sync_memory.md

  # -- member-sync — deterministic vcs2l workspace-member discovery/registration
  member_sync:
    enabled: true                 # enable periodic member-sync passes
    interval_seconds: 86400       # seconds between passes (min 60 enforced in worker)

  # -- survey agent — discovers OSS projects; proposes improvements --------
  survey:
    enabled: true                   # enable periodic survey passes (on by default)
    interval_seconds: 86400         # seconds between passes (min 60 enforced in worker)
    memory_path: null               # defaults to <data_dir>/survey_memory.md
    request_limit: 40               # per-survey-run main-agent request cap (runaway-loop guard)
    web_fetch_max_calls: 5          # per-survey-run cap on web_fetch calls (across all ask_web_knowledge consults)
    web_fetch_max_total_bytes: 500000  # per-survey-run cumulative byte cap on web_fetch returned text
    web_search_max_calls: 5         # per-survey-run cap on web_search invocations

  # -- module_curator agent — detects drift in the module taxonomy ---------
  module_curator:
    enabled: true                   # enable periodic module-curator passes
    interval_seconds: 86400         # seconds between passes (min 60 enforced in worker)
    memory_path: null               # defaults to <data_dir>/module_curator_memory.md
    request_limit: 120              # max model requests per curator pass

  # -- CI monitor — enabled/interval are now per-repo fields in repos.yaml --
  #    ci_log_max_bytes stays here as a global operational cap.
  ci_monitor:
    log_max_bytes: 65536            # max bytes fetched per CI job log

  # -- timeout escalation — escalates AWAITING_USER_REPLY tickets stuck too long
  timeout_escalation:
    enabled: true                   # enable periodic timeout-escalation passes
    interval_seconds: 3600          # seconds between scans (3600 = 1 hour)
    threshold_seconds: 259200       # staleness threshold (259200 = 3 days); ≤0 disables

  # -- Langfuse cleanup — caps per-project trace count, oldest deleted first
  langfuse_cleanup:
    enabled: true                   # enable periodic Langfuse trace cleanup
    interval_seconds: 86400         # seconds between sweeps
    max_traces: 1000                # per-project cap; oldest are deleted

# ---------------------------------------------------------------------------
#  service — management-plane API and data directory
# ---------------------------------------------------------------------------

service:
  data_dir: .data                           # data directory for DB, workspaces, memory ledgers
  default_repo_id: ""                       # default repo id for the mill (empty = none)
  api_host: "127.0.0.1"                     # FastAPI listen address (container: 0.0.0.0)
  api_port: 8077                            # FastAPI listen port
  api_url: http://127.0.0.1:8077            # base URL the CLI client uses
  shutdown_grace_seconds: 1800              # max seconds to wait for in-flight periodic passes on shutdown

# ---------------------------------------------------------------------------
#  board_agent — expose this mill's board over the agent-comm broker so other
#  agents (e.g. the cost-analyst) can drive it. Off by default; set broker_host
#  + broker_token (in mill.local.yaml) to register as a pull/mailbox responder.
# ---------------------------------------------------------------------------

board_agent:
  enabled: false                            # master switch for the board agent
  api_url: http://127.0.0.1:8077            # board REST API the agent calls (this mill)
  api_token: ""                             # bearer for the board API ("" = none, e.g. loopback)
  repo_id: ""                               # board repo id ("" → the worker's lead repo)
  write_ops: true                           # allow write ops (create_ticket, transition, …)
  broker_host: ""                           # agent-comm broker host (e.g. ai-broker.robotsix.net); "" → disabled
  broker_port: 443                          # broker port
  broker_scheme: https                      # broker scheme (http/https)
  broker_token: ""                          # this agent's bearer token for the broker

# ---------------------------------------------------------------------------
#  board_manager — conversational LLM board manager. A level-3 agent manages the
#  board from natural-language instructions (with a level-1 recall pass over its
#  capped question→answer memory). Reuses board_agent.* (board API + broker) and
#  mill's OpenRouter key; only broker_token + the master switch are its own.
# ---------------------------------------------------------------------------

board_manager:
  enabled: false                            # master switch for the board manager
  broker_token: ""                          # the manager's bearer token for the broker
  model: ""                                 # level-3 model ("" → llmio tier-3 default)
  recall_model: ""                          # level-1 recall model ("" → tier-1 default)
  max_conversations: 200                    # cap on retained question→answer turns

# ---------------------------------------------------------------------------
#  component_agent — generic monitor/config responder on the agent-comm broker.
#  Answers /health, /config, /metrics etc. Off by default; enable with
#  component_agent.enabled=true, broker_host, and broker_token.
# ---------------------------------------------------------------------------

component_agent:
  enabled: false                            # master switch for the component agent
  agent_id: component-robotsix-mill         # agent id registered on the broker
  broker_host: ""                           # broker host; "" → disabled
  broker_port: 443                          # broker port
  broker_scheme: https                      # broker scheme (http/https)
  broker_token: ""                          # bearer token for the broker
