# Repos registry — copy to config/repos.yaml and fill in your repo configs.
#
#   cp config/repos.example.yaml config/repos.yaml
#
# Each repo gets its own board ID and Langfuse project for observability
# isolation.  This file is NOT merged into the main Settings object — it
# is loaded by a separate ReposRegistry Pydantic model.
#
# Override the file path with MILL_REPOS_FILE env var.

repos:
  example-repo:
    board_id: "example-board"
    # forge_remote_url: "https://github.com/your-org/your-repo.git"  # optional — defaults to FORGE_REMOTE_URL
    langfuse:
      project_name: "example-repo"
      public_key: "pk-lf-..."
      secret_key: "sk-lf-..."
      base_url: "https://cloud.langfuse.com"  # optional — defaults to cloud
    # ci_monitor:                 # optional — per-repo CI failure monitoring
    #   enabled: true             #   default: true
    #   interval_seconds: 86400   #   default: 86400 (24h)
    # max_concurrency: 1          # optional — tickets from THIS repo
    #                             #   processed in parallel.  Default 1.
    #                             #   Per-repo isolation: each repo
    #                             #   gets its own consumer pool, so a
    #                             #   busy repo can't block another.
    # language: python             # optional — auto-injects language conventions into implement agent
