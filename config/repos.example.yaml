# Example entries for the repos: key of config/config.json.
# Copy this structure into your config.json "repos" block, or use
# MILL_REPOS_FILE to point the mill at a standalone repos file.
#
# Every entry needs at least a board_id.
repos:
  my-repo:
    board_id: "my-board"
    # forge_remote_url: "https://github.com/your-org/your-repo.git"  # optional — defaults to FORGE_REMOTE_URL
    # Langfuse credentials are configured globally in the `secrets:` block —
    # there is no per-repo langfuse configuration.
