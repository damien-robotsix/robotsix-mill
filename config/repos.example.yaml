# Repos registry — example entries for the `repos:` key of the main
# config/config.yaml (the single config entry point; a standalone
# config/repos.yaml is NO LONGER read).  Copy the `repos:` block below
# into config/config.yaml and fill in your repo configs.
#
# Each repo gets its own board ID and Langfuse project for observability
# isolation.  This file is NOT merged into the main Settings object — it
# is loaded by a separate ReposRegistry Pydantic model.
#
# There is no longer a board-less default — every repo must define a
# `board_id`. For single-repo deployments, configure exactly one repo
# entry below.
#
# Override the file path with MILL_REPOS_FILE env var.

repos:
  example-repo:
    board_id: "example-board"
    # forge_remote_url: "https://github.com/your-org/your-repo.git"  # optional — defaults to FORGE_REMOTE_URL
    # deployed_log_folder: "/var/log/example-repo"  # optional — host path to
    #                             #   the live deployment's log directory. When
    #                             #   set and pointing at an existing dir, the
    #                             #   refine agent gets read access (log-query
    #                             #   tool). Deployment-specific host path —
    #                             #   kept here, NOT in the managed repo's
    #                             #   committed .robotsix-mill/config.yaml.
    # working_branch: "main"      # optional — pinned branch that member repos
    #                             #   branch from and PR into (e.g. "lyrical").
    #                             #   Defaults to None → fork's default branch.
    langfuse:
      project_name: "example-repo"
      # project_id: ""            # optional — explicit Langfuse project ID
      #                           #   (distinct from project_name). Default "".
      public_key: "pk-lf-..."
      secret_key: "sk-lf-..."
      base_url: "https://cloud.langfuse.com"  # optional — defaults to cloud
    # langfuse_from: "master-repo-id"  # optional — inherit the master
    #   repo's Langfuse project (whole workspace shares ONE project).
    #   When set, OMIT the `langfuse:` block above: a repo with
    #   `langfuse_from` MUST NOT carry its own keys. Set automatically
    #   for auto-registered workspace members.
    # openrouter_api_key: ""      # optional — per-repo OpenRouter API
    #                             #   key override. When set, overrides
    #                             #   the global OPENROUTER_API_KEY for
    #                             #   LLM calls scoped to this repo.
    #                             #   Default None (use global key).
    # ci_monitor:                 # optional — per-repo CI failure monitoring
    #   enabled: true             #   default: true
    #   interval_seconds: 900     #   default: 900 (15 min)
    # max_concurrency: 1          # optional — tickets from THIS repo
    #                             #   processed in parallel.  Default 1.
    #                             #   Per-repo isolation: each repo
    #                             #   gets its own consumer pool, so a
    #                             #   busy repo can't block another.
    # max_inflight_prs: 3         # optional — max concurrent in-flight
    #                             #   PR tickets (DELIVERABLE through
    #                             #   ADDRESSING_REVIEW) before the worker
    #                             #   stops dispatching new work for this
    #                             #   repo. Merge-pipeline tickets are
    #                             #   always processed. Default 3.
    # sandbox_image: "ros:rolling-ros-base"   # optional — per-repo sandbox
    #   image for this repo's gates + interactive commands. Default:
    #   MILL_SANDBOX_IMAGE / Settings.sandbox_image (python:3.14-slim).
    #   ALL ROS/apt/system deps MUST be baked into this image: the sandbox
    #   runs non-root (apt blocked) and the egress proxy excludes apt.ros.org
    #   (rosdep cannot fetch at gate time). The matching gate this unblocks
    #   lives in the MEMBER repo's own .robotsix-mill/config.yaml, e.g.:
    #   test_command: >-
    #     . /opt/ros/rolling/setup.sh &&
    #     colcon build --packages-select <pkg> &&
    #     colcon test --packages-select <pkg> &&
    #     colcon test-result --verbose
    # cross_repo_target:          # optional — deliver to an external fork.
    #   # When set, a ticket that runs against THIS repo has its branch
    #   # pushed to `fork_remote_url` and a PR opened fork→upstream against
    #   # `upstream_remote_url`/`base_branch` (instead of the clone remote).
    #   # GitHub-only. Per-ticket overrides are not (yet) supported.
    #   upstream_remote_url: "https://github.com/upstream-org/their-repo.git"
    #   fork_remote_url: "https://github.com/your-org/their-repo.git"
    #   base_branch: "main"       # optional — upstream branch to PR into. Default "main".
    #   auto_fork: false          # optional — when true, ensure the fork exists
    #                             #   via the forge fork API before push. Default false.
    # NOTE: `test_command` and `language(s)` are NO LONGER set here. A managed
    #   repo owns both in its OWN source tree at
    #   <repo>/.robotsix-mill/config.yaml:
    #       test_command: pytest -q
    #       languages: [python]
    #   (`MILL_TEST_COMMAND` remains the fleet-wide test-gate fallback.)
    # NOTE: periodic agents are NO LONGER enabled here. A periodic workflow
    # runs for a repo iff that repo ships a presence file at
    #   <repo>/.robotsix-mill/periodic/<name>.yaml
    # (committed in the MANAGED repo, not here). A name-only file inherits the
    # built-in workflow; add prompt_overlay:/model:/interval_seconds: to
    # override. A name matching no built-in defines a brand-new agent (needs
    # system_prompt). Known names: audit, health, module_curator, trace_review,
    # bc_check, completeness_check, copy_paste, survey, test_gap, agent_check,
    # config_sync.
    # langfuse_cleanup is global-only (centralized; per-repo presence files are
    # ignored with a warning).

# Meta board — dedicated Langfuse project for the cross-repo meta-agent.
#
# This is a TOP-LEVEL block (sibling of `repos:`, NOT a repo entry): the
# meta board is synthetic — it has no clone and no forge remote — so it
# lives outside the repos mapping. When present with valid keys, the
# meta-agent's periodic passes trace to THIS project exactly like the
# per-repo pipelines trace to theirs. Omit the block (or leave the keys
# blank) and the meta-agent runs untraced, as before.
#
# Create a dedicated "meta" project in your Langfuse instance and paste
# its keys here (do NOT reuse a per-repo project — keeping it separate
# keeps meta's cross-repo cost out of any single repo's totals):
#
# meta:
#   langfuse:
#     project_name: "robotsix-meta"
#     public_key: "pk-lf-..."     # <-- the dedicated meta project's public key
#     secret_key: "sk-lf-..."     # <-- the dedicated meta project's secret key
#     base_url: "https://cloud.langfuse.com"
