# Default configuration for robotsix-auto-mail.
#
# Do not edit this file — copy config/mail.local.example.yaml to
# config/mail.local.yaml and override values there.
#
# This file is tracked in git and ships with every supported default.
# The config loader deep-merges mail.defaults.yaml (loaded first) with
# mail.local.yaml (loaded second), so operators only need to set the
# fields they want to change.

imap:
  host: ""          # required — operator must supply in mail.local.yaml
  port: 993
  tls_mode: direct-tls
  folder: INBOX

smtp:
  host: ""          # required — operator must supply in mail.local.yaml
  port: 587
  tls_mode: starttls

auth:
  username: ""      # required — operator must supply in mail.local.yaml
  password: ""      # required — operator must supply in mail.local.yaml

store:
  path: /home/mailbot/data/mail.db
