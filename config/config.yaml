# =============================================================================
#  central-deploy operator config form for robotsix-mill.
#
#  This file is read ONLY by central-deploy: it is fetched at onboarding,
#  rendered as the dashboard config form, and the operator-edited result is
#  written back into the mill-config volume at the config-target path
#  (/app/config/config.yaml — see deploy/docker-compose.yml).
#
#  At container start, entrypoint.sh (deploy mode) SPLITS this file into the
#  two files the mill's config loader actually reads:
#    * the `secrets:` sub-map -> config/secrets.yaml (flat, 0600)
#    * everything else        -> config/mill.local.yaml (overlay)
#  and forces the deploy invariants service.api_host=0.0.0.0 and
#  service.data_dir=/data.  The mill itself NEVER reads this file directly.
#
#  Secret convention (central-deploy §8): a leaf is a masked password input
#  ONLY when its value is the literal sentinel "SECRET".  central-deploy
#  detects secrets by this explicit marker — there is no name-based heuristic
#  — so every sensitive leaf MUST be set to "SECRET" here or it renders as a
#  plain, editable (plaintext) default.  Non-"SECRET" leaves are plain
#  defaults.  The operator fills real values in the dashboard; the deployed
#  config never contains the literal "SECRET".
#
#  The managed fleet (config/repos.yaml) is NOT part of this form — it is
#  managed in-band, not at deploy time.  All other tunables keep their
#  config/mill.defaults.yaml values unless added here.
# =============================================================================

# Forge backend the mill delivers PRs to.
forge:
  kind: github                  # github | gitlab | none
  remote_url: https://github.com  # base remote URL (edit for self-hosted / GitLab)

# A couple of high-level pipeline gates an operator may want to flip at
# deploy time.  See config/mill.defaults.yaml (gates:) for the full set.
gates:
  review_enabled: true          # dual-model code review before deliver
  auto_merge_enabled: false     # auto-merge green PRs after review approves

# Credentials.  Each "SECRET" leaf renders as a masked password input in the
# dashboard; fill the real value there, not here.  These map 1:1 to
# config/secrets.yaml field names.  (langfuse_public_key is genuinely a
# non-secret value but is grouped here for convenience — it stays "SECRET"
# only if you want it masked; leave "" to edit it in the clear.)
secrets:
  openrouter_api_key: SECRET    # required — all LLM calls route via OpenRouter  # pragma: allowlist secret
  forge_token: SECRET           # forge PAT (push / PR / merge)  # pragma: allowlist secret
  langfuse_public_key: SECRET   # observability (optional)  # pragma: allowlist secret
  langfuse_secret_key: SECRET   # observability (optional)  # pragma: allowlist secret
