# =============================================================================
#  Secrets template — copy to config/secrets.yaml and fill in your credentials.
#
#    cp config/secrets.example.yaml config/secrets.yaml
#
#  This file is gitignored; config/secrets.yaml is loaded by a separate
#  Secrets Pydantic model (NOT merged into the main Settings object).  File
#  permissions should be 0600.
#
#  See docs/rfc-config-v2.md for architecture rationale.
#  See config/mill.defaults.yaml for all non-secret config knobs.
# =============================================================================

# OpenRouter API key — required for ALL LLM calls via pydantic-ai.
openrouter_api_key: ""

# OpenRouter management API key — for credit balance checks (GET /api/v1/activity).
# Separate from the inference API key; must have management-level access.
# Leave blank to skip OpenRouter-side fetching.
openrouter_management_key: ""

# Forge delivery — PAT for forge authentication (alternative to GitHub App).
forge_token: ""

# Repo-creation PAT — used ONLY for creating new repositories (new-repo
# meta tickets). GitHub App installation tokens cannot create repos under a
# personal account; a PAT with repo-creation rights (classic: `repo` scope;
# fine-grained: Administration:Read and write on the target owner) is used
# for that one call while everyday push/PR keeps using the App token.
# Leave blank if you never auto-create repos.
forge_repo_create_token: ""

# GitHub App bot identity — used when FORGE_AUTH=app.
github_app_id: ""
github_app_private_key: ""             # inline PEM; newlines as \n
github_app_private_key_path: ""        # alternative: path to PEM file on disk

# Langfuse observability — required for tracing.
langfuse_public_key: ""
langfuse_secret_key: ""
langfuse_base_url: ""         # leave blank for Langfuse Cloud (default)
langfuse_project_id: ""
langfuse_project_name: ""

# ntfy.sh notification — leave blank to disable.
ntfy_url: ""
ntfy_token: ""
